<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAM — 금융</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070f;
      --bg2:     #0d0d1a;
      --card:    #11111e;
      --card2:   #161626;
      --border:  rgba(255,255,255,0.07);
      --accent:  #4f8ef7;
      --accent2: #93bfff;
      --text:    #eeeeff;
      --text2:   #7070a0;
      --text3:   #3a3a58;
      --success: #4ecb8d;
      --warning: #f5a623;
      --error:   #f06a6a;
      --sidebar: 232px;
      --radius:  14px;
    }

    html, body { height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: var(--sidebar); min-width: var(--sidebar);
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 0 0; overflow-y: auto; overflow-x: hidden; z-index: 100;
    }
    .sidebar::-webkit-scrollbar { width: 0; }
    .sidebar-logo { padding: 0 20px 22px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
    .logo-lam {
      font-size: 19px; font-weight: 800; letter-spacing: 0.06em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-full { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; margin-top: 3px; }
    .sidebar-section { padding: 0 10px; margin-bottom: 6px; }
    .sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text3);
      padding: 0 8px; margin-bottom: 5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 11px; border-radius: 10px;
      font-size: 13px; font-weight: 500; color: var(--text2);
      cursor: pointer; text-decoration: none;
      transition: background 0.16s, color 0.16s; margin-bottom: 1px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(79,142,247,0.13); color: var(--accent); font-weight: 600; }
    .nav-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding: 14px 10px 20px; border-top: 1px solid var(--border); }
    .profile-card {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 11px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border); margin-bottom: 8px;
    }
    .profile-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .profile-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .profile-email { font-size: 10px; color: var(--text3); margin-top: 1px;
                     white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .btn-logout {
      width: 100%; padding: 8px; border-radius: 8px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); font-family: 'Pretendard', sans-serif;
      font-size: 12px; cursor: pointer;
      transition: background 0.16s, color 0.16s, border-color 0.16s;
    }
    .btn-logout:hover { background: rgba(240,106,106,0.09); color: var(--error); border-color: rgba(240,106,106,0.28); }

    /* ══ MAIN ══ */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 26px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .topbar-left h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
    .topbar-left p  { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .topbar-right   { display: flex; align-items: center; gap: 10px; }
    .month-badge {
      padding: 7px 14px; border-radius: 9px;
      background: var(--card); border: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text2);
    }
    .btn-record {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 18px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #7eb3ff);
      border: none; color: #fff; font-family: 'Pretendard', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: box-shadow 0.2s, scale 0.15s;
    }
    .btn-record:hover { box-shadow: 0 6px 20px rgba(79,142,247,0.4); scale: 1.02; }
    .btn-record:active { scale: 0.98; }

    .content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 22px 26px 60px; display: flex; flex-direction: column; gap: 20px;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ══ SUMMARY CARDS ══ */
    .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .summary-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      position: relative; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .summary-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--card-accent, var(--accent)); opacity: 0.8;
    }
    .summary-card:hover { border-color: rgba(255,255,255,0.13); transform: translateY(-2px); }
    .sc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sc-icon   { font-size: 17px; }
    .sc-value  { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 3px; }
    .sc-label  { font-size: 12px; color: var(--text2); }
    .sc-sub    { font-size: 11px; color: var(--text3); margin-top: 8px; }

    /* ══ PANEL ══ */
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; }
    .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
    .panel-title { font-size: 14px; font-weight: 700; }
    .panel-sub   { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .middle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* 항목별 집계 (가로 막대) */
    .bar-list { display: flex; flex-direction: column; gap: 13px; }
    .bar-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .bar-name { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
    .bar-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .bar-amt  { font-size: 13px; font-weight: 700; }
    .bar-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 100px; width: 0%; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); }
    .empty-hint { font-size: 12px; color: var(--text3); padding: 20px 0; text-align: center; line-height: 1.6; }

    /* 최근 내역 */
    .activity-list { display: flex; flex-direction: column; gap: 8px; }
    .activity-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 15px; border-radius: 11px;
      background: var(--card2); border: 1px solid var(--border);
      transition: border-color 0.16s;
    }
    .activity-item:hover { border-color: rgba(79,142,247,0.24); }
    .act-dot {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .act-body { flex: 1; min-width: 0; }
    .act-title { font-size: 13px; font-weight: 600; }
    .act-meta  { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .act-value { font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .act-value.income  { color: var(--success); }
    .act-value.expense { color: var(--accent2); }
    .act-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      width: 26px; height: 26px; border-radius: 7px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; font-family: 'Pretendard', sans-serif;
    }
    .icon-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .icon-btn.del:hover { color: var(--error); border-color: rgba(240,106,106,0.3); background: rgba(240,106,106,0.06); }

    /* 투자 메모 */
    .memo-area {
      width: 100%; min-height: 120px; resize: vertical;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 11px; padding: 14px 16px;
      color: var(--text); font-family: 'Pretendard', sans-serif;
      font-size: 13px; line-height: 1.7;
      transition: border-color 0.16s;
    }
    .memo-area:focus { outline: none; border-color: rgba(79,142,247,0.4); }
    .memo-area::placeholder { color: var(--text3); }
    .memo-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .memo-status { font-size: 11px; color: var(--text3); }
    .btn-save-memo {
      padding: 8px 18px; border-radius: 9px;
      background: rgba(79,142,247,0.13); border: 1px solid rgba(79,142,247,0.3);
      color: var(--accent2); font-family: 'Pretendard', sans-serif;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.16s;
    }
    .btn-save-memo:hover { background: rgba(79,142,247,0.2); }

    /* ══ ANIMATION ══ */
    .fade-up { opacity: 0; transform: translateY(14px); animation: fadeUp 0.5s ease forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    /* ══ MODAL ══ */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    #modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%; max-width: 420px;
      background: #0e0e1c; border: 1px solid var(--border);
      border-radius: 18px; padding: 26px;
      transform: translateY(16px) scale(0.98); transition: transform 0.25s ease;
    }
    #modal-overlay.show .modal { transform: translateY(0) scale(1); }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }
    .field input, .field select {
      width: 100%; padding: 11px 13px; border-radius: 10px;
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text); font-family: 'Pretendard', sans-serif; font-size: 14px;
      transition: border-color 0.16s;
    }
    .field input:focus, .field select:focus { outline: none; border-color: rgba(79,142,247,0.45); }
    .field input::placeholder { color: var(--text3); }
    .seg { display: flex; gap: 8px; }
    .seg-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text2); font-family: 'Pretendard', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.16s;
    }
    .seg-btn.active.income  { background: rgba(78,203,141,0.14); border-color: rgba(78,203,141,0.4); color: var(--success); }
    .seg-btn.active.expense { background: rgba(79,142,247,0.14); border-color: rgba(79,142,247,0.4); color: var(--accent2); }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-cancel {
      flex: 1; padding: 12px; border-radius: 10px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text2); font-family: 'Pretendard', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.16s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .btn-submit {
      flex: 1.5; padding: 12px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #7eb3ff);
      border: none; color: #fff; font-family: 'Pretendard', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: box-shadow 0.2s, scale 0.15s;
    }
    .btn-submit:hover { box-shadow: 0 6px 20px rgba(79,142,247,0.4); }
    .btn-submit:active { scale: 0.98; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 22px; border-radius: 12px;
      font-size: 13px; font-weight: 600; z-index: 300;
      opacity: 0; pointer-events: none; transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok { border-color: rgba(78,203,141,0.4); }
    #toast.err { border-color: rgba(240,106,106,0.4); }

    .loading-center { text-align: center; color: var(--text2); padding: 40px; font-size: 13px; }

    /* ══ MOBILE ══ */
    @media (max-width: 900px) {
      .middle-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar  { padding: 13px 16px; }
      .content { padding: 16px 14px 90px; }
      .summary-grid { grid-template-columns: 1fr; gap: 10px; }
    }
  </style>
</head>

  <!-- ══ SIDEBAR ══ -->

</div>

}
function fmtDate(s) {
  const d = new Date(s);
  if (isNaN(d)) return s;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

/* ══════════════════════════════════════
   Toast
══════════════════════════════════════ */
let toastTimer;
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2200);
}

/* ══════════════════════════════════════
   초기화
══════════════════════════════════════ */
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'index.html'; return; }
  USER = session.user;

  // 프로필
  const { data: p } = await sb.from('profiles').select('name,email').eq('id', USER.id).single();
  const name = p?.name || USER.email.split('@')[0];
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileEmail').textContent = p?.email || USER.email;
  document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();

  await ensureCategory();
  await ensureMetrics();
  await loadRecords();
  render();
})();

async function doLogout() {
  await sb.auth.signOut();
  location.href = 'index.html';
}

/* ── 금융 카테고리 확보 (없으면 생성) ── */
async function ensureCategory() {
  let { data } = await sb.from('categories').select('*').eq('user_id', USER.id).eq('name', '금융').maybeSingle();
  if (!data) {
    const ins = await sb.from('categories').insert({
      user_id: USER.id, name: '금융', icon: '💰', color: '#4ecb8d', sort_order: 1
    }).select().single();
    data = ins.data;
  }
  CATEGORY = data;
}

/* ── 금융 항목 확보 (없는 것만 생성) ── */
async function ensureMetrics() {
  const { data: existing } = await sb.from('metrics').select('*').eq('user_id', USER.id).eq('category_id', CATEGORY.id);
  const existNames = (existing || []).map(m => m.name);
  const toAdd = DEFAULT_METRICS.filter(m => !existNames.includes(m.name))
    .map(m => ({ user_id: USER.id, category_id: CATEGORY.id, name: m.name, type: m.type, unit: m.unit }));
  if (toAdd.length) await sb.from('metrics').insert(toAdd);
  const { data: all } = await sb.from('metrics').select('*').eq('user_id', USER.id).eq('category_id', CATEGORY.id);
  // 정의 순서대로 정렬
  const order = DEFAULT_METRICS.map(m => m.name);
  METRICS = (all || []).sort((a,b) => order.indexOf(a.name) - order.indexOf(b.name));
}

/* ── 이번 달 기록 로드 ── */
async function loadRecords() {
  const start = `${yyyy}-${String(mm).padStart(2,'0')}-01`;
  const endDate = new Date(yyyy, mm, 0).getDate();
  const end = `${yyyy}-${String(mm).padStart(2,'0')}-${String(endDate).padStart(2,'0')}`;
  const { data } = await sb.from('records').select('*')
    .eq('user_id', USER.id).eq('category_id', CATEGORY.id)
    .gte('recorded_at', start).lte('recorded_at', end)
    .order('recorded_at', { ascending: false }).order('created_at', { ascending: false });
  RECORDS = data || [];
}

function metricById(id) { return METRICS.find(m => m.id === id); }

/* ══════════════════════════════════════
   렌더
══════════════════════════════════════ */
function render() {
  const incomeSum = RECORDS.filter(r => metricById(r.metric_id)?.type === 'income')
                           .reduce((s,r) => s + Number(r.value||0), 0);
  const expense = RECORDS.filter(r => metricById(r.metric_id)?.type === 'expense')
                         .reduce((s,r) => s + Number(r.value||0), 0);
  const balance = incomeSum - expense;

  // 항목별 지출 집계
  const byMetric = {};
  RECORDS.forEach(r => {
    const m = metricById(r.metric_id);
    if (m && m.type === 'expense') byMetric[m.id] = (byMetric[m.id]||0) + Number(r.value||0);
  });
  const expenseMetrics = METRICS.filter(m => m.type === 'expense');
  const maxExp = Math.max(1, ...Object.values(byMetric));

  document.getElementById('topSub').textContent =
    RECORDS.length ? `이번 달 ${RECORDS.length}건 기록됨` : '이번 달 가계부를 기록해보세요';

  const c = document.getElementById('content');
  c.innerHTML = `
    <!-- 요약 카드 -->
    <div class="summary-grid fade-up">
      <div class="summary-card" style="--card-accent:#4ecb8d">
        <div class="sc-header"><span class="sc-icon">📈</span></div>
        <div class="sc-value" style="color:var(--success)">${fmtWon(incomeSum)}</div>
        <div class="sc-label">이번 달 수입</div>
        <div class="sc-sub">${mm}월 누적</div>
      </div>
      <div class="summary-card" style="--card-accent:#4f8ef7">
        <div class="sc-header"><span class="sc-icon">📉</span></div>
        <div class="sc-value" style="color:var(--accent2)">${fmtWon(expense)}</div>
        <div class="sc-label">이번 달 지출</div>
        <div class="sc-sub">${mm}월 누적</div>
      </div>
      <div class="summary-card" style="--card-accent:${balance>=0?'#4ecb8d':'#f06a6a'}">
        <div class="sc-header"><span class="sc-icon">💵</span></div>
        <div class="sc-value" style="color:${balance>=0?'var(--success)':'var(--error)'}">${fmtWon(balance)}</div>
        <div class="sc-label">이번 달 잔액 (수입−지출)</div>
        <div class="sc-sub">${balance>=0?'흑자 흐름이에요':'지출이 수입을 넘었어요'}</div>
      </div>
    </div>

    <!-- 항목별 집계 + 최근 내역 -->
    <div class="middle-row fade-up" style="animation-delay:0.08s">
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">이번 달 항목별 지출</div>
            <div class="panel-sub">어디에 가장 많이 썼는지 확인하세요</div>
          </div>
        </div>
        <div class="bar-list" id="barList"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">최근 기록 내역</div>
            <div class="panel-sub">${mm}월 입력 내역 · 수정/삭제 가능</div>
          </div>
        </div>
        <div class="activity-list" id="recList"></div>
      </div>
    </div>

    <!-- 투자 포트폴리오 메모 -->
    <div class="panel fade-up" style="animation-delay:0.14s">
      <div class="panel-header">
        <div>
          <div class="panel-title">📌 투자 포트폴리오 메모</div>
          <div class="panel-sub">공부한 내용, 투자 아이디어, 실행 계획을 자유롭게 기록하세요</div>
        </div>
      </div>
      <textarea class="memo-area" id="memoArea" placeholder="예) 적립식 ETF 공부 중 — 매달 30만원씩 분할 매수 계획. 비상금 6개월치 먼저 확보 후 시작."></textarea>
      <div class="memo-footer">
        <div class="memo-status" id="memoStatus"></div>
        <button class="btn-save-memo" onclick="saveMemo()">메모 저장</button>
      </div>
    </div>
  `;

  // 항목별 막대
  const bar = document.getElementById('barList');
  if (Object.keys(byMetric).length === 0) {
    bar.innerHTML = `<div class="empty-hint">아직 이번 달 지출 기록이 없어요.<br>오른쪽 위 "기록하기"로 첫 지출을 입력해보세요.</div>`;
  } else {
    bar.innerHTML = '';
    expenseMetrics.forEach((m, i) => {
      const amt = byMetric[m.id] || 0;
      if (amt === 0) return;
      const pct = (amt / maxExp) * 100;
      const color = COLORS[METRICS.indexOf(m) % COLORS.length];
      bar.innerHTML += `
        <div>
          <div class="bar-info">
            <div class="bar-name"><div class="bar-dot" style="background:${color}"></div>${m.name}</div>
            <div class="bar-amt" style="color:${color}">${fmtWon(amt)}</div>
          </div>
          <div class="bar-track"><div class="bar-fill" style="background:${color}" data-w="${pct}"></div></div>
        </div>`;
    });
    setTimeout(() => document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.dataset.w + '%'), 200);
  }

  // 최근 내역
  const rec = document.getElementById('recList');
  if (RECORDS.length === 0) {
    rec.innerHTML = `<div class="empty-hint">아직 기록이 없어요.<br>첫 기록을 추가해보세요.</div>`;
  } else {
    rec.innerHTML = '';
    RECORDS.forEach(r => {
      const m = metricById(r.metric_id);
      if (!m) return;
      const isIncome = m.type === 'income';
      const color = COLORS[METRICS.indexOf(m) % COLORS.length];
      rec.innerHTML += `
        <div class="activity-item">
          <div class="act-dot" style="background:${color}22; color:${color}">${isIncome?'＋':'－'}</div>
          <div class="act-body">
            <div class="act-title">${m.name}${r.memo?` · <span style="color:var(--text2);font-weight:500">${escapeHtml(r.memo)}</span>`:''}</div>
            <div class="act-meta">${fmtDate(r.recorded_at)}</div>
          </div>
          <div class="act-value ${isIncome?'income':'expense'}">${isIncome?'+':'-'}${fmtWon(r.value)}</div>
          <div class="act-actions">
            <button class="icon-btn" title="수정" onclick="editRecord('${r.id}')">✎</button>
            <button class="icon-btn del" title="삭제" onclick="deleteRecord('${r.id}')">✕</button>
          </div>
        </div>`;
    });
  }

  loadMemo();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ══════════════════════════════════════
   모달
══════════════════════════════════════ */
function fillMetricSelect() {
  const sel = document.getElementById('inMetric');
  const list = METRICS.filter(m => m.type === curType);
  sel.innerHTML = list.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
}
function setType(t) {
  curType = t;
  document.getElementById('segExpense').classList.toggle('active', t==='expense');
  document.getElementById('segIncome').classList.toggle('active', t==='income');
  fillMetricSelect();
}
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '기록 추가';
  setType('expense');
  document.getElementById('inValue').value = '';
  document.getElementById('inMemo').value = '';
  document.getElementById('inDate').value = todayStr();
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function handleOverlayClick(e) { if (e.target.id === 'modal-overlay') closeModal(); }

function editRecord(id) {
  const r = RECORDS.find(x => x.id === id);
  if (!r) return;
  const m = metricById(r.metric_id);
  editingId = id;
  document.getElementById('modalTitle').textContent = '기록 수정';
  setType(m ? m.type : 'expense');
  document.getElementById('inMetric').value = r.metric_id;
  document.getElementById('inValue').value = r.value;
  document.getElementById('inMemo').value = r.memo || '';
  document.getElementById('inDate').value = r.recorded_at;
  document.getElementById('modal-overlay').classList.add('show');
}

async function submitRecord() {
  const metricId = document.getElementById('inMetric').value;
  const value = document.getElementById('inValue').value;
  const date = document.getElementById('inDate').value;
  const memo = document.getElementById('inMemo').value.trim();

  if (!metricId) return toast('항목을 선택해주세요', 'err');
  if (!value || Number(value) <= 0) return toast('금액을 올바르게 입력해주세요', 'err');
  if (!date) return toast('날짜를 선택해주세요', 'err');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  const payload = {
    user_id: USER.id, category_id: CATEGORY.id, metric_id: metricId,
    value: String(value), memo: memo || null, recorded_at: date,
    status: curType === 'income' ? '수입' : '지출'
  };

  let error;
  if (editingId) {
    ({ error } = await sb.from('records').update(payload).eq('id', editingId));
  } else {
    ({ error } = await sb.from('records').insert(payload));
  }

  btn.disabled = false; btn.textContent = '저장';

  if (error) { toast('저장 실패: ' + error.message, 'err'); return; }
  toast(editingId ? '수정되었습니다' : '저장되었습니다', 'ok');
  closeModal();
  await loadRecords();
  render();
}

async function deleteRecord(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  const { error } = await sb.from('records').delete().eq('id', id);
  if (error) { toast('삭제 실패: ' + error.message, 'err'); return; }
  toast('삭제되었습니다', 'ok');
  await loadRecords();
  render();
}

/* ══════════════════════════════════════
   투자 메모 (localStorage 미사용 → DB 미연동 임시: 이번 단계는 화면만)
   ※ 다음 단계에서 전용 테이블 또는 monthly memo로 DB 저장 연결 예정
══════════════════════════════════════ */
let MEMO_KEY_NOTE = '이 메모는 다음 단계에서 DB에 저장되도록 연결할 예정입니다.';
function loadMemo() {
  const el = document.getElementById('memoStatus');
  if (el) el.textContent = MEMO_KEY_NOTE;
}
function saveMemo() {
  toast('메모 DB 저장은 다음 단계에서 연결됩니다', 'err');
}
</script>
</body>
</html>
