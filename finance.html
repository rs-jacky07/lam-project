<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAM — 금융</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07070f; --bg2:#0d0d1a; --card:#15151f; --card2:#1c1c2b;
      --border:rgba(255,255,255,0.10);
      --accent:#5b9bff; --accent2:#9cc6ff;
      /* 시인성 강화: 본문 텍스트 더 밝게, 보조 텍스트도 끌어올림 */
      --text:#f4f4fb; --text2:#b8b8d4; --text3:#7e7ea4;
      --success:#56d99a; --warning:#ffb338; --error:#ff7a7a; --gold:#ffc14d;
      --sidebar:232px; --radius:14px;
    }
    html, body { height:100%; font-family:'Pretendard',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; font-size:15px; }
    .app { display:flex; height:100vh; overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--bg2);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      padding:24px 0 0; overflow-y:auto; overflow-x:hidden; z-index:100; }
    .sidebar::-webkit-scrollbar { width:0; }
    .sidebar-logo { padding:0 20px 22px; border-bottom:1px solid var(--border); margin-bottom:18px; }
    .logo-lam { font-size:20px; font-weight:800; letter-spacing:0.06em;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-full { font-size:11px; color:var(--text3); letter-spacing:0.05em; margin-top:3px; }
    .sidebar-section { padding:0 10px; margin-bottom:6px; }
    .sidebar-label { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--text3); padding:0 8px; margin-bottom:6px; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      font-size:14px; font-weight:600; color:var(--text2); cursor:pointer; text-decoration:none;
      transition:background 0.16s,color 0.16s; margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .nav-item.active { background:rgba(91,155,255,0.18); color:var(--accent2); font-weight:700; }
    .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-bottom { margin-top:auto; padding:14px 10px 20px; border-top:1px solid var(--border); }
    .profile-card { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border); margin-bottom:8px; }
    .profile-avatar { width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
    .profile-name { font-size:14px; font-weight:700; color:var(--text); }
    .profile-email { font-size:11px; color:var(--text3); margin-top:1px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
    .btn-logout { width:100%; padding:9px; border-radius:8px; background:transparent;
      border:1px solid var(--border); color:var(--text2); font-family:'Pretendard',sans-serif;
      font-size:13px; font-weight:600; cursor:pointer; transition:all 0.16s; }
    .btn-logout:hover { background:rgba(255,122,122,0.12); color:var(--error); border-color:rgba(255,122,122,0.35); }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px;
      border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
    .topbar-left h1 { font-size:20px; font-weight:800; letter-spacing:-0.01em; }
    .topbar-left p { font-size:13px; color:var(--text2); margin-top:3px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .month-badge { padding:8px 15px; border-radius:9px; background:var(--card);
      border:1px solid var(--border); font-size:14px; font-weight:700; color:var(--text); }
    .btn-record { display:flex; align-items:center; gap:7px; padding:10px 20px; border-radius:10px;
      background:linear-gradient(135deg,var(--accent),#82b4ff); border:none; color:#fff;
      font-family:'Pretendard',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
      transition:box-shadow 0.2s,scale 0.15s; }
    .btn-record:hover { box-shadow:0 6px 22px rgba(91,155,255,0.5); scale:1.02; }
    .btn-record:active { scale:0.98; }
    .content { flex:1; overflow-y:auto; overflow-x:hidden; padding:24px 28px 48px;
      display:flex; flex-direction:column; gap:18px; }
    .content::-webkit-scrollbar { width:5px; }
    .content::-webkit-scrollbar-track { background:transparent; }
    .content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    /* ══ 비교 카드 ══ */
    .compare { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .cmp-row { display:grid; grid-template-columns:130px 1fr 1fr 1fr; align-items:stretch; }
    .cmp-row + .cmp-row { border-top:1px solid var(--border); }
    .cmp-row.head { background:rgba(255,255,255,0.04); }
    .cmp-row.data { min-height:150px; }   /* 두 데이터 행 높이 동일 고정 */
    .cmp-label { display:flex; flex-direction:column; justify-content:center; gap:3px;
      padding:16px 20px; border-right:1px solid var(--border); }
    .cmp-label .t { font-size:15px; font-weight:800; color:var(--text); }
    .cmp-label .s { font-size:11px; color:var(--text3); }
    .cmp-cell { padding:16px 20px; border-right:1px solid var(--border); text-align:right;
      display:flex; flex-direction:column; justify-content:center; align-items:flex-end; }
    .cmp-cell:last-child { border-right:none; }
    .cmp-cell .ct { font-size:12px; color:var(--text2); margin-bottom:5px; font-weight:600; letter-spacing:0.03em; }
    .cmp-head-cell { display:flex; align-items:center; justify-content:flex-end; gap:7px; }
    .cmp-head-cell .dot { width:9px; height:9px; border-radius:50%; }
    .cmp-head-cell .ht { font-size:13px; font-weight:700; }
    .cmp-cell .cv { font-size:21px; font-weight:800; letter-spacing:-0.02em; }
    .cmp-cell.income .cv { color:var(--success); }
    .cmp-cell.expense .cv { color:var(--error); }
    .cmp-cell.save .cv { color:var(--gold); }
    .cmp-cell .delta { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700;
      margin-top:6px; padding:3px 9px; border-radius:100px; }
    .cmp-bar { width:100%; height:7px; margin-top:9px; background:rgba(255,255,255,0.07);
      border-radius:100px; overflow:hidden; }
    .cmp-bar i { display:block; height:100%; width:0; border-radius:100px;
      transition:width 0.9s cubic-bezier(0.4,0,0.2,1); }
    .cmp-cell.income .cmp-bar i { background:linear-gradient(90deg,var(--success),#8af0bf); }
    .cmp-cell.expense .cmp-bar i { background:linear-gradient(90deg,var(--error),#ffb0b0); }
    .cmp-cell.save .cmp-bar i { background:linear-gradient(90deg,var(--gold),#ffe0a0); }
    .delta.up   { color:var(--error);   background:rgba(255,122,122,0.15); }
    .delta.dn   { color:var(--success); background:rgba(86,217,154,0.15); }
    .delta.flat { color:var(--text3);   background:rgba(255,255,255,0.06); }
    .cmp-rank { margin-top:9px; display:flex; flex-direction:column; gap:3px; align-items:flex-end; }
    .cmp-rank .r { font-size:11px; color:var(--text2); }
    .cmp-rank .r b { color:var(--text); font-weight:700; }
    .cmp-rank .r .medal { margin-right:3px; }

    /* ══ 툴바 ══ */
    .toolbar { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:14px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .toolbar-search { display:flex; align-items:center; gap:8px; background:var(--bg2);
      border:1px solid var(--border); border-radius:10px; padding:10px 13px;
      width:240px; flex-shrink:0; transition:border-color 0.16s; }
    .toolbar-search:focus-within { border-color:var(--accent); }
    .toolbar-search span { font-size:13px; color:var(--text2); }
    .toolbar-search input { flex:1; min-width:0; background:transparent; border:none; outline:none;
      color:var(--text); font-family:'Pretendard',sans-serif; font-size:14px; }
    .toolbar-search input::placeholder { color:var(--text3); }
    .month-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .month-chip { padding:7px 13px; border-radius:100px; font-size:13px; font-weight:700;
      background:transparent; border:1px solid var(--border); color:var(--text2); cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .month-chip:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .month-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* ══ 3열 보드 ══ */
    .board { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; align-items:start; }
    .board-col { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px; display:flex; flex-direction:column; gap:11px; min-height:160px; }
    .col-head { display:flex; align-items:center; justify-content:space-between; }
    .col-head-left { display:flex; align-items:center; gap:9px; }
    .col-head-right { display:flex; align-items:center; gap:8px; }
    .col-total { font-size:14px; font-weight:800; }
    .col-tools { display:flex; gap:5px; }
    .col-btn { width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); cursor:pointer; font-size:14px; font-weight:800;
      display:flex; align-items:center; justify-content:center; font-family:'Pretendard',sans-serif;
      transition:all 0.14s; line-height:1; }
    .col-btn:hover { border-color:var(--accent); color:var(--accent2); background:rgba(91,155,255,0.1); }
    .col-btn.sort { font-size:13px; }
    .col-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:800; }
    .col-dot { width:9px; height:9px; border-radius:50%; }
    .col-income .col-total { color:var(--success); }
    .col-expense .col-total { color:var(--error); }
    .col-save .col-total { color:var(--gold); }
    .col-body { display:flex; flex-direction:column; gap:9px; }
    .tx { display:flex; align-items:stretch; background:var(--card2); border:1px solid var(--border);
      border-radius:11px; overflow:hidden; transition:border-color 0.16s; }
    .tx:hover { border-color:rgba(91,155,255,0.4); }
    .tx-main { flex:1; min-width:0; padding:13px 15px; cursor:pointer;
      display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .tx-left { min-width:0; }
    .tx-cat { font-size:14px; font-weight:700; color:var(--text); }
    .tx-memo { font-size:12px; color:var(--text2); margin-top:3px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
    .tx-right { text-align:right; flex-shrink:0; }
    .tx-amt { font-size:15px; font-weight:800; letter-spacing:-0.01em; }
    .col-income .tx-amt { color:var(--success); }
    .col-expense .tx-amt { color:var(--error); }
    .col-save .tx-amt { color:var(--gold); }
    .tx-date { font-size:11px; color:var(--text3); margin-top:3px; }
    .tx-ops { display:flex; flex-direction:column; border-left:1px solid var(--border); }
    .tx-ops button { flex:1; width:48px; border:none; background:transparent; cursor:pointer;
      color:var(--text2); font-size:12px; font-weight:700; font-family:'Pretendard',sans-serif;
      transition:background 0.14s,color 0.14s; }
    .tx-ops button:hover { background:rgba(91,155,255,0.16); color:var(--accent2); }
    .tx-ops button.del:hover { background:rgba(255,122,122,0.16); color:var(--error); }
    .tx-ops button + button { border-top:1px solid var(--border); }
    .col-empty { font-size:13px; color:var(--text3); text-align:center; padding:26px 0; }
    .col-add { margin-top:2px; width:100%; padding:11px; border-radius:10px;
      background:transparent; border:1px dashed var(--border); color:var(--text2);
      font-family:'Pretendard',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
      transition:all 0.16s; }
    .col-add:hover { border-color:var(--accent); color:var(--accent2); background:rgba(91,155,255,0.08); }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.66); backdrop-filter:blur(4px);
      display:none; align-items:center; justify-content:center; z-index:200; opacity:0; transition:opacity 0.22s; }
    .modal-bg.on { display:flex; opacity:1; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:18px;
      padding:28px; width:430px; max-width:92vw; transform:scale(0.96); transition:transform 0.22s; }
    .modal-bg.on .modal { transform:scale(1); }
    .modal h3 { font-size:19px; font-weight:800; margin-bottom:22px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--text2); margin-bottom:8px; font-weight:700; }
    .field input, .field select { width:100%; background:var(--bg2); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px;
      font-family:'Pretendard',sans-serif; outline:none; transition:border-color 0.16s; }
    .field input:focus, .field select:focus { border-color:var(--accent); }
    .type-tabs { display:flex; gap:7px; }
    .type-tabs button { flex:1; padding:11px; border-radius:10px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); font-size:14px; cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; font-weight:700; }
    .type-tabs button.on { background:rgba(91,155,255,0.18); color:var(--accent2); border-color:var(--accent); }
    .modal-foot { display:flex; gap:9px; margin-top:24px; }
    .modal-foot button { flex:1; padding:13px; border-radius:10px; font-size:14px; font-weight:700;
      cursor:pointer; border:none; font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .btn-cancel { background:var(--card2); color:var(--text2); border:1px solid var(--border); }
    .btn-cancel:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .btn-save { background:linear-gradient(135deg,var(--accent),#82b4ff); color:#fff; }
    .btn-save:hover { box-shadow:0 6px 22px rgba(91,155,255,0.5); }

    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(18px);
      background:var(--accent); color:#fff; padding:13px 24px; border-radius:10px; font-size:14px;
      font-weight:700; opacity:0; pointer-events:none; transition:all 0.28s; z-index:300; }
    .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
    .fade-up { opacity:0; transform:translateY(14px); animation:fadeUp 0.5s ease forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media (max-width:900px){ .board { grid-template-columns:1fr; } }
    @media (max-width:768px){
      .sidebar { display:none; }
      .topbar { padding:14px 16px; }
      .content { padding:18px 14px 80px; }
      .toolbar-search { width:100%; }
      .cmp-row { grid-template-columns:92px 1fr 1fr 1fr; }
      .cmp-cell { padding:12px 10px; }
      .cmp-cell .cv { font-size:16px; }
    }
  
    /* ── 모바일 햄버거 ── */
    .hamburger { display:none; width:38px; height:38px; border-radius:9px; border:1px solid var(--border);
      background:var(--card); color:var(--text); font-size:18px; cursor:pointer; align-items:center;
      justify-content:center; flex-shrink:0; margin-right:4px; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
      backdrop-filter:blur(2px); z-index:140; opacity:0; transition:opacity 0.22s; }
    .sidebar-overlay.on { display:block; opacity:1; }
    @media (max-width:768px){
      .hamburger { display:flex; }
      .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%);
        transition:transform 0.26s cubic-bezier(0.4,0,0.2,1); display:flex; }
      .sidebar.open { transform:translateX(0); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-lam">LAM</div>
      <div class="logo-full">Life Architecture Map</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">메뉴</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">⊞</span> 대시보드</a>
      <a class="nav-item" href="history.html"><span class="nav-icon">◷</span> 히스토리</a>
      <a class="nav-item" href="compare.html"><span class="nav-icon">⟳</span> 월간 비교</a>
    </div>
    <div class="sidebar-section" style="margin-top:10px;">
      <div class="sidebar-label">카테고리</div>
      <a class="nav-item active" href="finance.html"><span class="nav-icon">💰</span> 금융</a>
      <a class="nav-item" href="skin.html"><span class="nav-icon">✨</span> 피부</a>
      <a class="nav-item" href="health.html"><span class="nav-icon">💪</span> 건강</a>
      <a class="nav-item" href="music.html"><span class="nav-icon">🎵</span> 음악</a>
      <a class="nav-item" href="business.html"><span class="nav-icon">💼</span> 사업</a>
    </div>
    <div class="sidebar-section" style="margin-top:10px;">
      <div class="sidebar-label">설정</div>
      <a class="nav-item" href="settings.html"><span class="nav-icon">⚙</span> 설정</a>
    </div>
    <div class="sidebar-bottom">
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div style="min-width:0;">
          <div class="profile-name" id="profileName">로딩 중...</div>
          <div class="profile-email" id="profileEmail"></div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;min-width:0;"><button class="hamburger" onclick="toggleSidebar()" aria-label="메뉴">☰</button><div class="topbar-left">
        <h1>💰 금융</h1>
        <p id="todayDate"></p>
      </div></div>
      <div class="topbar-right">
        <div class="month-badge" id="monthBadge"></div>
        <button class="btn-record" onclick="openModal(false)">+ 새 거래 입력</button>
      </div>
    </div>

    <div class="content">

      <!-- ① 비교 카드 -->
      <div class="compare fade-up">
        <div class="cmp-row head">
          <div class="cmp-label"><span class="t">구분</span></div>
          <div class="cmp-cell"><div class="cmp-head-cell"><span class="dot" style="background:var(--success)"></span><span class="ht" style="color:var(--success)">수입</span></div></div>
          <div class="cmp-cell"><div class="cmp-head-cell"><span class="dot" style="background:var(--error)"></span><span class="ht" style="color:var(--error)">지출</span></div></div>
          <div class="cmp-cell"><div class="cmp-head-cell"><span class="dot" style="background:var(--gold)"></span><span class="ht" style="color:var(--gold)">저축·투자</span></div></div>
        </div>
        <div class="cmp-row data">
          <div class="cmp-label"><span class="t">최근 평균</span><span class="s" id="avgRange">데이터 누적 시</span></div>
          <div class="cmp-cell income"><div class="cv" id="avgIncome">0원</div><div class="cmp-bar"><i id="barAvgIncome"></i></div></div>
          <div class="cmp-cell expense"><div class="cv" id="avgExpense">0원</div><div class="cmp-bar"><i id="barAvgExpense"></i></div></div>
          <div class="cmp-cell save"><div class="cv" id="avgSave">0원</div><div class="cmp-bar"><i id="barAvgSave"></i></div></div>
        </div>
        <div class="cmp-row data">
          <div class="cmp-label"><span class="t" id="curMonthLabel">이번 달</span><span class="s">선택한 달 · 평균 대비</span></div>
          <div class="cmp-cell income">
            <div class="cv" id="curIncome">0원</div>
            <div class="cmp-bar"><i id="barCurIncome"></i></div>
            <div class="delta flat" id="dIncome">—</div>
            <div class="cmp-rank" id="rankIncome"></div>
          </div>
          <div class="cmp-cell expense">
            <div class="cv" id="curExpense">0원</div>
            <div class="cmp-bar"><i id="barCurExpense"></i></div>
            <div class="delta flat" id="dExpense">—</div>
            <div class="cmp-rank" id="rankExpense"></div>
          </div>
          <div class="cmp-cell save">
            <div class="cv" id="curSave">0원</div>
            <div class="cmp-bar"><i id="barCurSave"></i></div>
            <div class="delta flat" id="dSave">—</div>
            <div class="cmp-rank" id="rankSave"></div>
          </div>
        </div>
      </div>

      <!-- ② 툴바 -->
      <div class="toolbar fade-up" style="animation-delay:0.06s">
        <div class="toolbar-search">
          <span>🔍</span>
          <input id="searchInput" type="text" placeholder="검색..." />
        </div>
        <div class="month-row" id="monthRow"></div>
      </div>

      <!-- ③ 3열 보드 -->
      <div class="board fade-up" style="animation-delay:0.12s">
        <div class="board-col col-income">
          <div class="col-head">
            <div class="col-head-left">
              <div class="col-title"><span class="col-dot" style="background:var(--success)"></span> 수입</div>
              <div class="col-tools">
                <button class="col-btn" title="수입 추가" onclick="openModalType('income')">+</button>
                <button class="col-btn sort" id="sortIncome" title="날짜 정렬" onclick="toggleSort('income')">↓</button>
              </div>
            </div>
            <div class="col-total" id="colIncomeTotal">0원</div>
          </div>
          <div class="col-body" id="colIncome"></div>
        </div>
        <div class="board-col col-expense">
          <div class="col-head">
            <div class="col-head-left">
              <div class="col-title"><span class="col-dot" style="background:var(--error)"></span> 지출</div>
              <div class="col-tools">
                <button class="col-btn" title="지출 추가" onclick="openModalType('expense')">+</button>
                <button class="col-btn sort" id="sortExpense" title="날짜 정렬" onclick="toggleSort('expense')">↓</button>
              </div>
            </div>
            <div class="col-total" id="colExpenseTotal">0원</div>
          </div>
          <div class="col-body" id="colExpense"></div>
        </div>
        <div class="board-col col-save">
          <div class="col-head">
            <div class="col-head-left">
              <div class="col-title"><span class="col-dot" style="background:var(--gold)"></span> 저축·투자</div>
              <div class="col-tools">
                <button class="col-btn" title="저축·투자 추가" onclick="openModalType('save')">+</button>
                <button class="col-btn sort" id="sortSave" title="날짜 정렬" onclick="toggleSort('save')">↓</button>
              </div>
            </div>
            <div class="col-total" id="colSaveTotal">0원</div>
          </div>
          <div class="col-body" id="colSave"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">새 거래 입력</h3>
    <div class="field">
      <label>유형</label>
      <div class="type-tabs">
        <button data-type="expense" class="on">지출</button>
        <button data-type="income">수입</button>
        <button data-type="save">저축·투자</button>
      </div>
    </div>
    <div class="field"><label>카테고리</label><select id="fCat"></select></div>
    <div class="field"><label>금액</label><input id="fAmt" type="text" inputmode="numeric" placeholder="0" /></div>
    <div class="field"><label>날짜</label><input id="fDate" type="date" /></div>
    <div class="field"><label>메모 (선택)</label><input id="fMemo" type="text" placeholder="예: 점심 식사" /></div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveRecord()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jmumomvxylxbkagjnmxc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdW1vbXZ4eWx4YmthZ2pubXhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODc5NzksImV4cCI6MjA5NTg2Mzk3OX0.OQBcCmA7ULgZ28zujvuB_FH0WbUmlHqks_TY97FB7E8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CAT_OPTS = {
  income:['급여','부수입','기타 수입'],
  expense:['식비','교통비','주유비','숙박비','통신비','구독비','의료·건강','자기계발','경조사','기타'],
  save:['예금·적금','투자','비상금','기타']
};

let user=null, categoryId=null, editingId=null, curType='expense';
let yearRecords=[];
let selMonth = new Date().getMonth()+1;
let searchText='';
let sortDir = { income:'desc', expense:'desc', save:'desc' };  // 열별 날짜 정렬 (desc=최신순)
const YEAR = new Date().getFullYear();
const MEDALS = ['🥇','🥈','🥉'];

const won = n => Number(n).toLocaleString('ko-KR') + '원';
const $ = id => document.getElementById(id);
const days = ['일','월','화','수','목','금','토'];

(async function init(){
  const now = new Date();
  $('todayDate').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  $('monthBadge').textContent = `${now.getMonth()+1}월`;

  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ location.href='index.html'; return; }
  user = session.user;

  const { data:p } = await sb.from('profiles').select('name,email').eq('id',user.id).single();
  const name = p?.name || user.email.split('@')[0];
  $('profileName').textContent = name;
  $('profileEmail').textContent = p?.email || user.email;
  $('profileAvatar').textContent = name.charAt(0).toUpperCase();

  categoryId = await ensureFinanceCategory();
  buildMonthChips();
  setType('expense');
  $('fDate').value = new Date().toISOString().slice(0,10);
  await loadYear();
})();

async function ensureFinanceCategory(){
  const { data } = await sb.from('categories').select('id')
    .eq('user_id',user.id).eq('name','금융').maybeSingle();
  if(data) return data.id;
  const { data:ins } = await sb.from('categories')
    .insert({ user_id:user.id, name:'금융', icon:'💰', color:'#56d99a', sort_order:1 })
    .select('id').single();
  return ins.id;
}

function buildMonthChips(){
  $('monthRow').innerHTML = Array.from({length:12},(_,i)=>i+1).map(m=>
    `<button class="month-chip ${m===selMonth?'active':''}" data-m="${m}">${m}월</button>`
  ).join('');
  document.querySelectorAll('.month-chip').forEach(b=>{
    b.onclick = ()=>{
      selMonth = Number(b.dataset.m);
      document.querySelectorAll('.month-chip').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderAll();
    };
  });
}

function setType(t){
  curType=t;
  document.querySelectorAll('.type-tabs button').forEach(b=>b.classList.toggle('on', b.dataset.type===t));
  $('fCat').innerHTML = CAT_OPTS[t].map(c=>`<option>${c}</option>`).join('');
}
document.querySelectorAll('.type-tabs button').forEach(b=> b.onclick=()=>setType(b.dataset.type));
$('fAmt').addEventListener('input', e=>{
  const v=e.target.value.replace(/[^0-9]/g,'');
  e.target.value = v ? Number(v).toLocaleString('ko-KR') : '';
});

function openModal(edit){
  if(!edit){
    editingId=null;
    $('modalTitle').textContent='새 거래 입력';
    setType('expense');
    $('fAmt').value=''; $('fMemo').value='';
    const d = new Date(YEAR, selMonth-1, Math.min(new Date().getDate(), 28));
    $('fDate').value = d.toISOString().slice(0,10);
  }
  $('modalBg').classList.add('on');
}
function openModalType(t){
  openModal(false);
  setType(t);
}
function closeModal(){ $('modalBg').classList.remove('on'); }
$('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

async function saveRecord(){
  const amt = Number($('fAmt').value.replace(/[^0-9]/g,''));
  if(!amt){ toast('금액을 입력하세요'); return; }
  const cat = $('fCat').value;
  const rawMemo = $('fMemo').value.trim();
  const combinedMemo = `[${cat}]${rawMemo?' '+rawMemo:''}`;
  const payload = { user_id:user.id, category_id:categoryId, metric_id:null,
    value:amt, memo:combinedMemo, status:curType, recorded_at:$('fDate').value };
  let err;
  if(editingId){ ({error:err} = await sb.from('records').update(payload).eq('id',editingId)); }
  else { ({error:err} = await sb.from('records').insert(payload)); }
  if(err){ toast('저장 실패: '+err.message); return; }
  closeModal();
  toast(editingId?'수정되었습니다':'저장되었습니다');
  await loadYear();
}

async function loadYear(){
  const first = `${YEAR}-01-01`, last = `${YEAR}-12-31`;
  const { data:recs, error } = await sb.from('records').select('*')
    .eq('user_id',user.id).eq('category_id',categoryId)
    .gte('recorded_at',first).lte('recorded_at',last)
    .order('recorded_at',{ascending:false}).order('created_at',{ascending:false});
  if(error){ toast('불러오기 실패'); return; }
  yearRecords = recs || [];
  renderAll();
}

function parseCat(memo){ const m=(memo||'').match(/^\[(.+?)\]/); return m?m[1]:'기타'; }
function parseMemo(memo){ return (memo||'').replace(/^\[.+?\]\s?/,''); }
function monthOf(r){ return Number((r.recorded_at||'').slice(5,7)); }

function sums(recs){
  let inc=0,exp=0,sav=0;
  recs.forEach(r=>{
    if(r.status==='income') inc+=Number(r.value);
    else if(r.status==='expense') exp+=Number(r.value);
    else if(r.status==='save') sav+=Number(r.value);
  });
  return {inc,exp,sav};
}

/* 특정 유형의 카테고리별 TOP3 (선택 월) */
function topCats(recs, status){
  const grp={};
  recs.filter(r=>r.status===status).forEach(r=>{
    const c=parseCat(r.memo); grp[c]=(grp[c]||0)+Number(r.value);
  });
  const total = Object.values(grp).reduce((s,v)=>s+v,0);
  return Object.entries(grp).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([cat,amt])=>({cat, amt, pct: total?Math.round(amt/total*100):0}));
}

function renderAll(){ renderCompare(); renderBoard(); }

function renderCompare(){
  const monthsWithData = [...new Set(yearRecords.map(monthOf))];
  const curRecs = yearRecords.filter(r=>monthOf(r)===selMonth);
  const cur = sums(curRecs);

  let avg = {inc:0,exp:0,sav:0}, rangeText='데이터 누적 시 비교';
  if(monthsWithData.length){
    const tot = sums(yearRecords);
    const n = monthsWithData.length;
    avg = { inc:Math.round(tot.inc/n), exp:Math.round(tot.exp/n), sav:Math.round(tot.sav/n) };
    rangeText = `${YEAR}년 ${n}개 월 평균`;
  }
  $('avgRange').textContent = rangeText;
  $('avgIncome').textContent = won(avg.inc);
  $('avgExpense').textContent = won(avg.exp);
  $('avgSave').textContent = won(avg.sav);

  $('curMonthLabel').textContent = `${selMonth}월`;
  $('curIncome').textContent = won(cur.inc);
  $('curExpense').textContent = won(cur.exp);
  $('curSave').textContent = won(cur.sav);

  // 가로 막대: 각 유형별 (평균/이번달) 중 큰 값을 100% 기준으로
  setBar('barAvgIncome','barCurIncome', avg.inc, cur.inc);
  setBar('barAvgExpense','barCurExpense', avg.exp, cur.exp);
  setBar('barAvgSave','barCurSave', avg.sav, cur.sav);

  setDelta('dIncome', cur.inc, avg.inc, true);
  setDelta('dExpense', cur.exp, avg.exp, false);
  setDelta('dSave', cur.sav, avg.sav, true);

  renderRank('rankIncome', topCats(curRecs,'income'));
  renderRank('rankExpense', topCats(curRecs,'expense'));
  renderRank('rankSave', topCats(curRecs,'save'));
}

/* 가로 막대 폭 계산: 둘 중 큰 값 = 100% */
function setBar(avgId, curId, avgVal, curVal){
  const max = Math.max(avgVal, curVal);
  const a = $(avgId), c = $(curId);
  if(!a || !c) return;
  a.style.width = max ? (avgVal/max*100)+'%' : '0%';
  c.style.width = max ? (curVal/max*100)+'%' : '0%';
}

/* 증감: 이모지 + 색 배지 */
function setDelta(id, cur, avg, goodWhenUp){
  const el = $(id);
  if(!avg && !cur){ el.className='delta flat'; el.textContent='기록 없음'; return; }
  if(!avg){ el.className='delta flat'; el.textContent='첫 기록'; return; }
  const diff = cur - avg;
  if(diff===0){ el.className='delta flat'; el.textContent='⚖️ 평균과 동일'; return; }
  const pct = Math.round(diff/avg*100);
  const up = diff>0;
  const good = (up && goodWhenUp) || (!up && !goodWhenUp);
  el.className = 'delta ' + (good ? 'dn' : 'up');
  const emoji = up ? '🔺' : '🔻';
  el.textContent = `${emoji} 평균 대비 ${up?'+':'-'}${Math.abs(pct)}%`;
}

function renderRank(id, top){
  const el = $(id);
  if(!top.length){ el.innerHTML=''; return; }
  el.innerHTML = top.map((t,i)=>
    `<span class="r"><span class="medal">${MEDALS[i]}</span><b>${t.cat}</b> ${t.pct}%</span>`
  ).join('');
}

$('searchInput').addEventListener('input', e=>{ searchText=e.target.value.trim().toLowerCase(); renderBoard(); });

function visibleRecords(){
  return yearRecords.filter(r=>{
    if(monthOf(r)!==selMonth) return false;
    if(searchText){
      const hay = `${parseCat(r.memo)} ${parseMemo(r.memo)} ${r.value}`.toLowerCase();
      if(!hay.includes(searchText)) return false;
    }
    return true;
  });
}

function toggleSort(status){
  sortDir[status] = sortDir[status]==='desc' ? 'asc' : 'desc';
  const btn = $('sort'+status.charAt(0).toUpperCase()+status.slice(1));
  if(btn) btn.textContent = sortDir[status]==='desc' ? '↓' : '↑';
  renderBoard();
}

function renderBoard(){
  const vis = visibleRecords();
  const cols={income:[],expense:[],save:[]};
  vis.forEach(r=> cols[r.status]?.push(r));
  // 열별 날짜 정렬 (동일 날짜는 created_at 보조)
  ['income','expense','save'].forEach(st=>{
    const dir = sortDir[st]==='asc' ? 1 : -1;
    cols[st].sort((a,b)=>{
      const da=(a.recorded_at||''), db=(b.recorded_at||'');
      if(da!==db) return da<db ? -1*dir : 1*dir;
      const ca=(a.created_at||''), cb=(b.created_at||'');
      return ca<cb ? -1*dir : 1*dir;
    });
  });
  const totals={income:0,expense:0,save:0};
  vis.forEach(r=> totals[r.status]+=Number(r.value));
  $('colIncomeTotal').textContent = won(totals.income);
  $('colExpenseTotal').textContent = won(totals.expense);
  $('colSaveTotal').textContent = won(totals.save);

  const card = r=>{
    const cat=parseCat(r.memo), memo=parseMemo(r.memo);
    const d=(r.recorded_at||'').slice(5).replace('-','.');
    const sign = r.status==='expense'?'-':'+';
    const rj = JSON.stringify(r).replace(/'/g,"&#39;");
    return `<div class="tx">
      <div class="tx-main" onclick='editRec(${rj})'>
        <div class="tx-left">
          <div class="tx-cat">${cat}</div>
          ${memo?`<div class="tx-memo">${memo}</div>`:''}
        </div>
        <div class="tx-right">
          <div class="tx-amt">${sign}${won(r.value)}</div>
          <div class="tx-date">${d}</div>
        </div>
      </div>
      <div class="tx-ops">
        <button onclick='editRec(${rj})'>수정</button>
        <button class="del" onclick="delRec('${r.id}')">삭제</button>
      </div>
    </div>`;
  };
  $('colIncome').innerHTML  = cols.income.length  ? cols.income.map(card).join('')  : '<div class="col-empty">기록 없음</div>';
  $('colExpense').innerHTML = cols.expense.length ? cols.expense.map(card).join('') : '<div class="col-empty">기록 없음</div>';
  $('colSave').innerHTML    = cols.save.length    ? cols.save.map(card).join('')    : '<div class="col-empty">기록 없음</div>';
}

window.editRec = function(r){
  editingId = r.id;
  $('modalTitle').textContent='거래 수정';
  setType(r.status);
  const cat=parseCat(r.memo);
  [...$('fCat').options].forEach(o=>{ if(o.value===cat) o.selected=true; });
  $('fAmt').value = Number(r.value).toLocaleString('ko-KR');
  $('fMemo').value = parseMemo(r.memo);
  $('fDate').value = (r.recorded_at||'').slice(0,10);
  $('modalBg').classList.add('on');
};

window.delRec = async function(id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  const { error } = await sb.from('records').delete().eq('id',id);
  if(error){ toast('삭제 실패'); return; }
  toast('삭제되었습니다');
  await loadYear();
};

async function doLogout(){ await sb.auth.signOut(); location.href='index.html'; }

let tT;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),2200);
}

function toggleSidebar(){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay');
  if(!sb) return;
  const open=sb.classList.toggle('open');
  if(ov) ov.classList.toggle('on', open);
}
window.toggleSidebar=toggleSidebar;
</script>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
</body>
