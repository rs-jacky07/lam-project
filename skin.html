<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAM — 피부</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#07070f; --bg2:#0d0d1a; --card:#15151f; --card2:#1c1c2b;
      --border:rgba(255,255,255,0.10);
      --accent:#5b9bff; --accent2:#9cc6ff;
      --text:#f4f4fb; --text2:#b8b8d4; --text3:#7e7ea4;
      --success:#56d99a; --warning:#ffb338; --error:#ff7a7a; --gold:#ffc14d;
      --pink:#ff8fc7; --purple:#b18cff; --ig:#e1568a; --yt:#ff5b5b;
      --sidebar:232px; --radius:14px;
    }
    html,body { height:100%; font-family:'Pretendard',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; font-size:15px; }
    .app { display:flex; height:100vh; overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--bg2);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      padding:24px 0 0; overflow-y:auto; overflow-x:hidden; z-index:100; }
    .sidebar::-webkit-scrollbar { width:0; }
    .sidebar-logo { padding:0 20px 22px; border-bottom:1px solid var(--border); margin-bottom:18px; }
    .logo-lam { font-size:20px; font-weight:800; letter-spacing:0.06em;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-full { font-size:11px; color:var(--text3); letter-spacing:0.05em; margin-top:3px; }
    .sidebar-section { padding:0 10px; margin-bottom:6px; }
    .sidebar-label { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--text3); padding:0 8px; margin-bottom:6px; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      font-size:14px; font-weight:600; color:var(--text2); cursor:pointer; text-decoration:none;
      transition:background 0.16s,color 0.16s; margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .nav-item.active { background:rgba(91,155,255,0.18); color:var(--accent2); font-weight:700; }
    .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-bottom { margin-top:auto; padding:14px 10px 20px; border-top:1px solid var(--border); }
    .profile-card { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border); margin-bottom:8px; }
    .profile-avatar { width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
    .profile-name { font-size:14px; font-weight:700; color:var(--text); }
    .profile-email { font-size:11px; color:var(--text3); margin-top:1px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
    .btn-logout { width:100%; padding:9px; border-radius:8px; background:transparent;
      border:1px solid var(--border); color:var(--text2); font-family:'Pretendard',sans-serif;
      font-size:13px; font-weight:600; cursor:pointer; transition:all 0.16s; }
    .btn-logout:hover { background:rgba(255,122,122,0.12); color:var(--error); border-color:rgba(255,122,122,0.35); }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px;
      border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
    .topbar-left h1 { font-size:20px; font-weight:800; letter-spacing:-0.01em; }
    .topbar-left p { font-size:13px; color:var(--text2); margin-top:3px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .month-badge { padding:8px 15px; border-radius:9px; background:var(--card);
      border:1px solid var(--border); font-size:14px; font-weight:700; color:var(--text); }
    .btn-record { display:flex; align-items:center; gap:7px; padding:10px 20px; border-radius:10px;
      background:linear-gradient(135deg,var(--accent),#82b4ff); border:none; color:#fff;
      font-family:'Pretendard',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
      transition:box-shadow 0.2s,scale 0.15s; }
    .btn-record:hover { box-shadow:0 6px 22px rgba(91,155,255,0.5); scale:1.02; }
    .btn-record:active { scale:0.98; }
    .content { flex:1; overflow-y:auto; overflow-x:hidden; padding:24px 28px 48px;
      display:flex; flex-direction:column; gap:18px; }
    .content::-webkit-scrollbar { width:5px; }
    .content::-webkit-scrollbar-track { background:transparent; }
    .content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    /* 요약 카드 4개 */
    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .summary-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px 20px; position:relative; overflow:hidden; transition:border-color 0.2s,transform 0.2s;
      min-height:188px; display:flex; flex-direction:column; }  /* 4개 카드 높이 통일 */
    .summary-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:var(--card-accent,var(--accent)); opacity:0.85; }
    .summary-card:hover { border-color:rgba(255,255,255,0.16); transform:translateY(-2px); }
    .sc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .sc-icon { font-size:18px; }
    .sc-value { font-size:24px; font-weight:800; letter-spacing:-0.02em; margin-bottom:3px; }
    .sc-label { font-size:12px; color:var(--text2); font-weight:600; margin-bottom:10px; }

    /* 미니 TOP3 분포 */
    .sc-dist { display:flex; flex-direction:column; gap:4px; margin-top:6px; }
    .sc-dist-row { display:flex; align-items:center; gap:6px; font-size:11px; }
    .sc-dist-label { color:var(--text2); min-width:48px; font-weight:600; }
    .sc-dist-bar-wrap { flex:1; height:4px; background:rgba(255,255,255,0.07); border-radius:100px; overflow:hidden; }
    .sc-dist-bar { height:100%; border-radius:100px; transition:width 0.8s ease; }
    .sc-dist-val { color:var(--text3); min-width:28px; text-align:right; }

    /* 보완 카드 */
    .suggest-list { display:flex; flex-direction:column; gap:7px; margin-top:4px; }
    .suggest-item { font-size:12px; color:var(--text2); line-height:1.5; }
    .suggest-item strong { color:var(--warning); }
    .suggest-none { font-size:12px; color:var(--success); font-weight:600; }

    /* 평균 비교 배지 */
    .sc-delta { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
      margin-top:6px; padding:3px 9px; border-radius:100px; }
    .sc-delta.up   { color:var(--success); background:rgba(86,217,154,0.15); }
    .sc-delta.dn   { color:var(--error);   background:rgba(255,122,122,0.15); }
    .sc-delta.flat { color:var(--text3);   background:rgba(255,255,255,0.06); }
    .summary-card .sc-dist { margin-top:auto; padding-top:10px; }
    .summary-card .sc-sub { margin-top:auto; padding-top:10px; }
    .summary-card .suggest-list { margin-top:6px; }
    .summary-card .part-rank { margin-top:auto; padding-top:10px; }
    .summary-card .inst-rank { margin-top:auto; padding-top:10px; }


    /* 툴바 */
    .toolbar { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:14px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .toolbar-search { display:flex; align-items:center; gap:8px; background:var(--bg2);
      border:1px solid var(--border); border-radius:10px; padding:10px 13px;
      width:240px; flex-shrink:0; transition:border-color 0.16s; }
    .toolbar-search:focus-within { border-color:var(--accent); }
    .toolbar-search span { font-size:13px; color:var(--text2); }
    .toolbar-search input { flex:1; min-width:0; background:transparent; border:none; outline:none;
      color:var(--text); font-family:'Pretendard',sans-serif; font-size:14px; }
    .toolbar-search input::placeholder { color:var(--text3); }
    .month-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .month-chip { padding:7px 13px; border-radius:100px; font-size:13px; font-weight:700;
      background:transparent; border:1px solid var(--border); color:var(--text2); cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .month-chip:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .month-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* 2열 보드 */
    .board { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; align-items:start; }
    .board-col { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px; display:flex; flex-direction:column; gap:11px; min-height:200px; }
    .col-head { display:flex; align-items:center; justify-content:space-between; }
    .col-head-left { display:flex; align-items:center; gap:9px; }
    .col-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:800; }
    .col-dot { width:9px; height:9px; border-radius:50%; }
    .col-sub { font-size:12px; color:var(--text2); font-weight:600; }
    .col-tools { display:flex; gap:5px; }
    .col-btn { width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); cursor:pointer; font-size:14px; font-weight:800;
      display:flex; align-items:center; justify-content:center; font-family:'Pretendard',sans-serif;
      transition:all 0.14s; line-height:1; }
    .col-btn:hover { border-color:var(--accent); color:var(--accent2); background:rgba(91,155,255,0.1); }
    .col-btn.sort { font-size:13px; }
    .col-body { display:flex; flex-direction:column; gap:9px; }

    /* 카드 아이템 — 2열 레이아웃 */
    .item { display:flex; align-items:stretch; background:var(--card2); border:1px solid var(--border);
      border-radius:11px; overflow:hidden; transition:border-color 0.16s; }
    .item:hover { border-color:rgba(91,155,255,0.4); }
    .item-main { flex:1; min-width:0; padding:16px 18px; cursor:pointer;
      display:grid; grid-template-columns:1.1fr 1fr; gap:4px 18px; align-items:center; }
    /* 1열: 제품명 + 별점 + 날짜 */
    .item-left { display:flex; flex-direction:column; gap:8px; min-width:0; }
    .item-title { font-size:16px; font-weight:800; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-date-row { display:flex; align-items:center; gap:8px; }
    .item-date { font-size:12px; color:var(--text3); flex-shrink:0; }
    .item-stars { font-size:17px; color:var(--gold); letter-spacing:2px; }
    .item-stars .off { color:var(--text3); }
    .item-memo { font-size:12.5px; color:var(--text2); grid-column:1/-1; margin-top:8px;
      padding-top:8px; border-top:1px solid var(--border);
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    /* 2열: 배지 그룹 (우측 정렬, 2줄 묶음) */
    .item-right { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
    .badges { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
    .badge { font-size:11px; font-weight:800; padding:4px 10px; border-radius:100px; letter-spacing:0.02em; white-space:nowrap; }
    .badge.hwahae   { background:rgba(255,143,199,0.18); color:var(--pink); }
    .badge.glowpick { background:rgba(177,140,255,0.18); color:var(--purple); }
    .badge.buy      { background:rgba(86,217,154,0.16);  color:var(--success); }
    .badge.gift     { background:rgba(255,193,77,0.16);  color:var(--gold); }
    .badge.ig       { background:rgba(225,86,138,0.18);  color:#ff8fb6; }
    .badge.yt       { background:rgba(255,91,91,0.18);   color:#ff9a9a; }
    .badge.skin-dry     { background:rgba(91,155,255,0.16);  color:var(--accent2); }
    .badge.skin-oily    { background:rgba(255,179,56,0.16);  color:var(--warning); }
    .badge.skin-combo   { background:rgba(86,217,154,0.16);  color:var(--success); }
    .badge.skin-sensitive { background:rgba(255,122,122,0.16); color:var(--error); }
    .badge.skin-all     { background:rgba(177,140,255,0.16);  color:var(--purple); }
    .badge.skin-normal  { background:rgba(255,255,255,0.1);   color:var(--text2); }
    .badge.cat-item   { background:rgba(91,155,255,0.12);  color:var(--accent2); }
    .badge.ctype-item { background:rgba(255,193,77,0.12);  color:var(--gold); }
    .item-ops { display:flex; flex-direction:column; border-left:1px solid var(--border); }
    .item-ops button { flex:1; width:48px; border:none; background:transparent; cursor:pointer;
      color:var(--text2); font-size:12px; font-weight:700; font-family:'Pretendard',sans-serif;
      transition:background 0.14s,color 0.14s; }
    .item-ops button:hover { background:rgba(91,155,255,0.16); color:var(--accent2); }
    .item-ops button.del:hover { background:rgba(255,122,122,0.16); color:var(--error); }
    .item-ops button + button { border-top:1px solid var(--border); }
    .col-empty { font-size:13px; color:var(--text3); text-align:center; padding:30px 0; }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.66); backdrop-filter:blur(4px);
      display:none; align-items:center; justify-content:center; z-index:200; opacity:0; transition:opacity 0.22s; }
    .modal-bg.on { display:flex; opacity:1; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:18px;
      padding:28px; width:460px; max-width:92vw; transform:scale(0.96); transition:transform 0.22s;
      max-height:90vh; overflow-y:auto; }
    .modal-bg.on .modal { transform:scale(1); }
    .modal h3 { font-size:19px; font-weight:800; margin-bottom:22px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--text2); margin-bottom:8px; font-weight:700; }
    .field input, .field select, .field textarea {
      width:100%; background:var(--bg2); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px;
      font-family:'Pretendard',sans-serif; outline:none; transition:border-color 0.16s; resize:vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); }
    .field input[type=date] { cursor:pointer; }
    .field input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.7) brightness(1.4); cursor:pointer; opacity:0.9; }
    .field select option { background:var(--bg2); }
    .type-tabs { display:flex; gap:7px; }
    .type-tabs button { flex:1; padding:11px; border-radius:10px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); font-size:14px; cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; font-weight:700; }
    .type-tabs button.on { background:rgba(91,155,255,0.18); color:var(--accent2); border-color:var(--accent); }
    /* 피부타입 3x2 균형 그리드 */
    .skin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .skin-grid button { padding:12px 4px; border-radius:10px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); font-size:13.5px; cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; font-weight:700; text-align:center;
      white-space:nowrap; }
    .skin-grid button:hover { border-color:var(--accent); color:var(--text); }
    .skin-grid button.on { background:rgba(91,155,255,0.18); color:var(--accent2); border-color:var(--accent); }
    .star-input { display:flex; gap:6px; font-size:30px; line-height:1; }
    .star-input span { cursor:pointer; color:var(--text3); transition:color 0.12s,transform 0.12s; }
    .star-input span:hover { transform:scale(1.15); }
    .star-input span.on { color:var(--gold); }
    .modal-foot { display:flex; gap:9px; margin-top:24px; }
    .modal-foot button { flex:1; padding:13px; border-radius:10px; font-size:14px; font-weight:700;
      cursor:pointer; border:none; font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .btn-cancel { background:var(--card2); color:var(--text2); border:1px solid var(--border); }
    .btn-cancel:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .btn-save { background:linear-gradient(135deg,var(--accent),#82b4ff); color:#fff; }
    .btn-save:hover { box-shadow:0 6px 22px rgba(91,155,255,0.5); }

    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(18px);
      background:var(--accent); color:#fff; padding:13px 24px; border-radius:10px; font-size:14px;
      font-weight:700; opacity:0; pointer-events:none; transition:all 0.28s; z-index:300; }
    .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
    .fade-up { opacity:0; transform:translateY(14px); animation:fadeUp 0.5s ease forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media (max-width:900px) { .board { grid-template-columns:1fr; } .summary-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:768px) {
      .sidebar { display:none; }
      .topbar { padding:14px 16px; }
      .content { padding:18px 14px 80px; }
      .toolbar-search { width:100%; }
      .summary-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
      .sc-value { font-size:19px; }
      /* 카드: 모바일에선 세로 1열, 배지 좌측정렬 */
      .item-main { grid-template-columns:1fr; gap:10px; }
      .item-right { align-items:flex-start; }
      .badges { justify-content:flex-start; }
    }
  
    /* ── 모바일 햄버거 ── */
    .hamburger { display:none; width:38px; height:38px; border-radius:9px; border:1px solid var(--border);
      background:var(--card); color:var(--text); font-size:18px; cursor:pointer; align-items:center;
      justify-content:center; flex-shrink:0; margin-right:4px; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
      backdrop-filter:blur(2px); z-index:140; opacity:0; transition:opacity 0.22s; }
    .sidebar-overlay.on { display:block; opacity:1; }
    @media (max-width:768px){
      .hamburger { display:flex; }
      .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%);
        transition:transform 0.26s cubic-bezier(0.4,0,0.2,1); display:flex; z-index:160; }
      .sidebar.open { transform:translateX(0); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-lam">LAM</div>
      <div class="logo-full">Life Architecture Map</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">메뉴</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">⊞</span> 대시보드</a>
      <a class="nav-item" href="history.html"><span class="nav-icon">◷</span> 히스토리</a>
      <a class="nav-item" href="compare.html"><span class="nav-icon">⟳</span> 월간 비교</a>
      <a class="nav-item" href="channels.html"><span class="nav-icon">📈</span> 채널 추이</a>
    </div>
    <div class="sidebar-section" style="margin-top:10px;">
      <div class="sidebar-label">카테고리</div>
      <a class="nav-item" href="finance.html"><span class="nav-icon">💰</span> 금융</a>
      <a class="nav-item active" href="skin.html"><span class="nav-icon">✨</span> 피부</a>
      <a class="nav-item" href="health.html"><span class="nav-icon">💪</span> 건강</a>
      <a class="nav-item" href="music.html"><span class="nav-icon">🎵</span> 음악</a>
      <a class="nav-item" href="business.html"><span class="nav-icon">💼</span> 사업</a>
    </div>
    <div class="sidebar-section" style="margin-top:10px;">
      <div class="sidebar-label">설정</div>
      <a class="nav-item" href="settings.html"><span class="nav-icon">⚙</span> 설정</a>
    </div>
    <div class="sidebar-bottom">
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div style="min-width:0;">
          <div class="profile-name" id="profileName">로딩 중...</div>
          <div class="profile-email" id="profileEmail"></div>

function renderAll(){ renderSummary(); renderBoard(); }

/* ── 요약 카드 ── */
function renderSummary(){
  const allRevs  = yearRecords.filter(r=>r.status==='review');
  const allConts = yearRecords.filter(r=>r.status==='content');
  const mRevs    = allRevs.filter(r=>monthOf(r)===selMonth);
  const mConts   = allConts.filter(r=>monthOf(r)===selMonth);

  /* 월평균 계산 (데이터 있는 월만) */
  function monthAvg(arr){
    const byMonth={};
    arr.forEach(r=>{ const m=monthOf(r); byMonth[m]=(byMonth[m]||0)+1; });
    const vals=Object.values(byMonth);
    return vals.length? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1): null;
  }

  /* 카드1: 리뷰 수 */
  $('sc-reviewCount').textContent=mRevs.length+'개';
  const rvAvg=monthAvg(allRevs);
  const rvDelta=$('sc-reviewDelta');
  if(rvAvg){
    const diff=mRevs.length-Number(rvAvg);
    rvDelta.className='sc-delta '+(diff>=0?'up':'dn');
    rvDelta.textContent=`월평균 ${rvAvg}개 대비 ${diff>=0?'+':''}${diff.toFixed(1)}`;
  } else { rvDelta.className='sc-delta flat'; rvDelta.textContent='월평균 집계 중'; }
  /* 리뷰 피부타입 분포 */
  $('sc-reviewDist').innerHTML=skinDist(mRevs, 'review');

  /* 카드2: 콘텐츠 수 */
  $('sc-contentCount').textContent=mConts.length+'개';
  const ctAvg=monthAvg(allConts);
  const ctDelta=$('sc-contentDelta');
  if(ctAvg){
    const diff=mConts.length-Number(ctAvg);
    ctDelta.className='sc-delta '+(diff>=0?'up':'dn');
    ctDelta.textContent=`월평균 ${ctAvg}개 대비 ${diff>=0?'+':''}${diff.toFixed(1)}`;
  } else { ctDelta.className='sc-delta flat'; ctDelta.textContent='월평균 집계 중'; }
  /* 콘텐츠 피부타입 분포 */
  $('sc-contentDist').innerHTML=skinDist(mConts, 'content');

  /* 카드3: 평균 별점 + 제품 카테고리 TOP3 */
  const starVal=$('sc-starValue'), starDelta=$('sc-starDelta');
  if(mRevs.length){
    const avg=(mRevs.reduce((s,r)=>s+Number(r.value),0)/mRevs.length).toFixed(1);
    starVal.textContent='★ '+avg;
    const allAvg=allRevs.length?(allRevs.reduce((s,r)=>s+Number(r.value),0)/allRevs.length).toFixed(1):null;
    if(allAvg){
      const d=(Number(avg)-Number(allAvg)).toFixed(1);
      starDelta.className='sc-delta '+(d>=0?'up':'dn');
      starDelta.textContent=`전체 평균 ★${allAvg} (${d>=0?'+':''}${d})`;
    } else { starDelta.className='sc-delta flat'; starDelta.textContent=`전체 평균 ★${avg}`; }
  } else { starVal.textContent='—'; starDelta.className='sc-delta flat'; starDelta.textContent='리뷰 없음'; }
  /* 제품 카테고리 TOP3 */
  $('sc-catDist').innerHTML=catTop3(mRevs);

  /* 카드4: 보완 필요 */
  $('sc-suggest').innerHTML=buildSuggest(mRevs, mConts);
}

function skinDist(arr, type){
  const skinTypes=['건성','지성','수부지','복합성','민감성','모든피부'];
  const counts={};
  skinTypes.forEach(s=>counts[s]=0);
  arr.forEach(r=>{
    const s=type==='review'? part(r.memo,3): part(r.memo,2);
    if(counts[s]!==undefined) counts[s]++;
  });
  const total=arr.length||1;
  const sorted=skinTypes.filter(s=>counts[s]>0).sort((a,b)=>counts[b]-counts[a]).slice(0,3);
  if(!sorted.length) return '<div style="font-size:11px;color:var(--text3)">데이터 없음</div>';
  return sorted.map(s=>`
    <div class="sc-dist-row">
      <span class="sc-dist-label">${s}</span>
      <div class="sc-dist-bar-wrap"><div class="sc-dist-bar" style="width:${Math.round(counts[s]/total*100)}%;background:var(--accent)"></div></div>
      <span class="sc-dist-val">${counts[s]}</span>
    </div>`).join('');
}

function catTop3(revs){
  const cats={};
  revs.forEach(r=>{ const c=part(r.memo,4); if(c) cats[c]=(cats[c]||0)+1; });
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(!sorted.length) return '<div style="font-size:11px;color:var(--text3)">카테고리 데이터 없음</div>';
  const medals=['🥇','🥈','🥉'];
  return sorted.map(([c,n],i)=>`
    <div class="sc-dist-row">
      <span class="sc-dist-label">${medals[i]} ${c}</span>
      <span class="sc-dist-val" style="color:var(--text2)">${n}건</span>
    </div>`).join('');
}

function buildSuggest(revs, conts){
  const items=[];
  /* 피부타입별 리뷰 부족 */
  const skinTypes=['건성','지성','수부지','복합성','민감성'];
  const rvSkin={};
  revs.forEach(r=>{ const s=part(r.memo,3); if(s) rvSkin[s]=(rvSkin[s]||0)+1; });
  const minSkin=skinTypes.filter(s=>!rvSkin[s]||rvSkin[s]<2);
  if(minSkin.length) items.push(`<div class="suggest-item"><strong>${minSkin.slice(0,2).join(', ')}</strong> 피부 리뷰가 부족해요</div>`);
  /* 콘텐츠 유형 부족 */
  const ctypes=['비교리뷰','성분분석','루틴소개'];
  const ctSeen={};
  conts.forEach(r=>{ const c=part(r.memo,1); if(c) ctSeen[c]=true; });
  const missing=ctypes.filter(c=>!ctSeen[c]);
  if(missing.length) items.push(`<div class="suggest-item"><strong>${missing[0]}</strong> 콘텐츠가 없어요</div>`);
  /* 콘텐츠 피부 부족 */
  const ctSkin={};
  conts.forEach(r=>{ const s=part(r.memo,2); if(s) ctSkin[s]=(ctSkin[s]||0)+1; });
  const missCt=skinTypes.filter(s=>!ctSkin[s]);
  if(missCt.length) items.push(`<div class="suggest-item"><strong>${missCt.slice(0,2).join(', ')}</strong> 피부 콘텐츠가 없어요</div>`);

  if(!items.length) return '<div class="suggest-none">✅ 이번 달 밸런스 좋아요!</div>';
  return items.slice(0,3).join('');
}

/* ── 보드 렌더 ── */
function renderBoard(){
  /* 리뷰 */
  let revs=yearRecords.filter(r=>r.status==='review'&&monthOf(r)===selMonth);
  const allMRevs=revs.slice();
  if(searchText) revs=revs.filter(r=>`${part(r.memo,0)} ${part(r.memo,2)}`.toLowerCase().includes(searchText));
  revs=sortArr(revs,sortDir.review);
  const avg=allMRevs.length?(allMRevs.reduce((s,r)=>s+Number(r.value),0)/allMRevs.length).toFixed(1):null;
  $('reviewSub').textContent=`${allMRevs.length}개 · 평균 ${avg?('★'+avg):'—'}`;
  $('colReview').innerHTML=revs.length?revs.map(reviewCard).join(''):'<div class="col-empty">기록 없음</div>';
  /* 콘텐츠 */
  let conts=yearRecords.filter(r=>r.status==='content'&&monthOf(r)===selMonth);
  const allMConts=conts.slice();
  if(searchText) conts=conts.filter(r=>`${part(r.memo,0)} ${part(r.memo,1)}`.toLowerCase().includes(searchText));
  conts=sortArr(conts,sortDir.content);
  $('contentSub').textContent=`${allMConts.length}개`;
  $('colContent').innerHTML=conts.length?conts.map(contentCard).join(''):'<div class="col-empty">기록 없음</div>';
}

function reviewCard(r){
  const prod=part(r.memo,0), buy=part(r.memo,1), note=part(r.memo,2), skin=part(r.memo,3), cat=part(r.memo,4);
  const plat=midName(r.metric_id);
  const d=(r.recorded_at||'').slice(5).replace('-','.');
  const rj=JSON.stringify(r).replace(/'/g,"&#39;");
  const platBadge=plat==='화해'?'<span class="badge hwahae">화해</span>':'<span class="badge glowpick">글로우픽</span>';
  const buyBadge=buy==='체험단'?'<span class="badge gift">체험단</span>':'<span class="badge buy">직접구매</span>';
  const skinClass={'건성':'skin-dry','지성':'skin-oily','수부지':'skin-combo','복합성':'skin-normal','민감성':'skin-sensitive','모든피부':'skin-all'}[skin]||'skin-normal';
  const skinBadge=skin?`<span class="badge ${skinClass}">${skin}</span>`:'';
  const catBadge=cat?`<span class="badge cat-item">${cat}</span>`:'';
  return `<div class="item">
    <div class="item-main" onclick='editReview(${rj})'>
      <div class="item-left">
        <span class="item-title">${prod||'(제품명 없음)'}</span>
        <div class="item-stars">${stars(Number(r.value))}</div>
        <div class="item-date-row"><span class="item-date">${d}</span></div>
      </div>
      <div class="item-right">
        <div class="badges">${platBadge}${buyBadge}</div>
        <div class="badges">${catBadge}${skinBadge}</div>
      </div>
      ${note?`<div class="item-memo">${note}</div>`:''}
    </div>
    <div class="item-ops">
      <button onclick='editReview(${rj})'>수정</button>
      <button class="del" onclick="delRec('${r.id}')">삭제</button>
    </div></div>`;
}

function contentCard(r){
  const title=part(r.memo,0), ctype=part(r.memo,1), skin=part(r.memo,2), note=part(r.memo,3);
  const chan=midName(r.metric_id);
  const d=(r.recorded_at||'').slice(5).replace('-','.');
  const rj=JSON.stringify(r).replace(/'/g,"&#39;");
  const chBadge=chan==='instagram'?'<span class="badge ig">인스타그램</span>':'<span class="badge yt">유튜브</span>';
  const skinClass={'건성':'skin-dry','지성':'skin-oily','수부지':'skin-combo','복합성':'skin-normal','민감성':'skin-sensitive','모든피부':'skin-all'}[skin]||'skin-normal';
  const skinBadge=skin?`<span class="badge ${skinClass}">${skin}</span>`:'';
  const ctypeBadge=ctype?`<span class="badge ctype-item">${ctype}</span>`:'';
  return `<div class="item">
    <div class="item-main" onclick='editContent(${rj})'>
      <div class="item-left">
        <span class="item-title">${title||'(제목 없음)'}</span>
        <div class="item-date-row"><span class="item-date">${d}</span></div>
      </div>
      <div class="item-right">
        <div class="badges">${chBadge}${ctypeBadge}</div>
        <div class="badges">${skinBadge}</div>
      </div>
      ${note?`<div class="item-memo">${note}</div>`:''}
    </div>
    <div class="item-ops">
      <button onclick='editContent(${rj})'>수정</button>
      <button class="del" onclick="delRec('${r.id}')">삭제</button>
    </div></div>`;
}

/* ── 모달 ── */
function openReview(isEdit){
  if(!isEdit){ editingId=null; $('rvModalTitle').textContent='리뷰 작성';
    setPlat('화해'); setBuy('직접구매'); setSkin('건성'); setStar(0);
    $('rvProd').value=''; $('rvCat').value=''; $('rvMemo').value='';
    $('rvDate').value=now.toISOString().slice(0,10); }
  $('reviewModal').classList.add('on');
}
function closeReview(){ $('reviewModal').classList.remove('on'); editingId=null; }

function openContent(isEdit){
  if(!isEdit){ editingContentId=null; $('ctModalTitle').textContent='콘텐츠 업로드 기록';
    setChan('instagram'); setCtype('단독리뷰'); setCtSkin('건성');
    $('ctTitle').value=''; $('ctMemo').value='';
    $('ctDate').value=now.toISOString().slice(0,10); }
  $('contentModal').classList.add('on');
}
function closeContent(){ $('contentModal').classList.remove('on'); editingContentId=null; }

/* 탭 세터 */
function setPlat(v){ curPlat=v; document.querySelectorAll('#platTabs button').forEach(b=>b.classList.toggle('on',b.dataset.plat===v)); }
function setBuy(v){ curBuy=v; document.querySelectorAll('#buyTabs button').forEach(b=>b.classList.toggle('on',b.dataset.buy===v)); }
function setSkin(v){ curSkin=v; document.querySelectorAll('#skinTabs button').forEach(b=>b.classList.toggle('on',b.dataset.skin===v)); }
function setChan(v){ curChan=v; document.querySelectorAll('#chanTabs button').forEach(b=>b.classList.toggle('on',b.dataset.chan===v)); }
function setCtype(v){ curCtype=v; document.querySelectorAll('#ctypeTabs button').forEach(b=>b.classList.toggle('on',b.dataset.ctype===v)); }
function setCtSkin(v){ curCtSkin=v; document.querySelectorAll('#ctSkinTabs button').forEach(b=>b.classList.toggle('on',b.dataset.ctskin===v)); }

document.querySelectorAll('#platTabs button').forEach(b=>b.onclick=()=>setPlat(b.dataset.plat));
document.querySelectorAll('#buyTabs button').forEach(b=>b.onclick=()=>setBuy(b.dataset.buy));
document.querySelectorAll('#skinTabs button').forEach(b=>b.onclick=()=>setSkin(b.dataset.skin));
document.querySelectorAll('#chanTabs button').forEach(b=>b.onclick=()=>setChan(b.dataset.chan));
document.querySelectorAll('#ctypeTabs button').forEach(b=>b.onclick=()=>setCtype(b.dataset.ctype));
document.querySelectorAll('#ctSkinTabs button').forEach(b=>b.onclick=()=>setCtSkin(b.dataset.ctskin));

/* 별점 */
function setStar(n){ curStar=n; document.querySelectorAll('#starInput span').forEach(s=>s.classList.toggle('on',Number(s.dataset.v)<=n)); }
document.querySelectorAll('#starInput span').forEach(s=>s.onclick=()=>setStar(Number(s.dataset.v)));

/* 저장 — 리뷰 memo 구조: 제품명|구매유형|후기|피부타입|제품카테고리 */
async function saveReview(){
  const prod=$('rvProd').value.trim();
  const cat=$('rvCat').value;
  const memo=$('rvMemo').value.trim();
  const date=$('rvDate').value;
  if(!prod) return toast('제품명을 입력해주세요');
  if(!curStar) return toast('별점을 선택해주세요');
  if(!date) return toast('날짜를 선택해주세요');
  const memoStr=`${prod}|${curBuy}|${memo}|${curSkin}|${cat}`;
  const payload={ user_id:userId, metric_id:metricMap[curPlat], status:'review',
    value:String(curStar), memo:memoStr, recorded_at:date };
  let error;
  if(editingId){ ({error}=await sb.from('records').update(payload).eq('id',editingId)); }
  else { ({error}=await sb.from('records').insert(payload)); }
  if(error){ toast('저장 실패: '+error.message); return; }
  toast(editingId?'수정되었습니다':'리뷰가 저장되었습니다');
  closeReview(); await loadYear();
}

/* 저장 — 콘텐츠 memo 구조: 제목|콘텐츠유형|피부타입|메모 */
async function saveContent(){
  const title=$('ctTitle').value.trim();
  const note=$('ctMemo').value.trim();
  const date=$('ctDate').value;
  if(!title) return toast('콘텐츠 제목을 입력해주세요');
  if(!date) return toast('날짜를 선택해주세요');
  const memoStr=`${title}|${curCtype}|${curCtSkin}|${note}`;
  const payload={ user_id:userId, metric_id:metricMap[curChan], status:'content',
    value:'1', memo:memoStr, recorded_at:date };
  let error;
  if(editingContentId){ ({error}=await sb.from('records').update(payload).eq('id',editingContentId)); }
  else { ({error}=await sb.from('records').insert(payload)); }
  if(error){ toast('저장 실패: '+error.message); return; }
  toast(editingContentId?'수정되었습니다':'콘텐츠가 저장되었습니다');
  closeContent(); await loadYear();
}

window.editReview=function(r){
  editingId=r.id; $('rvModalTitle').textContent='리뷰 수정';
  setPlat(midName(r.metric_id)||'화해');
  setBuy(part(r.memo,1)||'직접구매');
  setSkin(part(r.memo,3)||'건성');
  setStar(Number(r.value));
  $('rvProd').value=part(r.memo,0);
  $('rvCat').value=part(r.memo,4)||'';
  $('rvMemo').value=part(r.memo,2);
  $('rvDate').value=(r.recorded_at||'').slice(0,10);
  $('reviewModal').classList.add('on');
};
window.editContent=function(r){
  editingContentId=r.id; $('ctModalTitle').textContent='콘텐츠 수정';
  setChan(midName(r.metric_id)||'instagram');
  setCtype(part(r.memo,1)||'단독리뷰');
  setCtSkin(part(r.memo,2)||'건성');
  $('ctTitle').value=part(r.memo,0);
  $('ctMemo').value=part(r.memo,3);
  $('ctDate').value=(r.recorded_at||'').slice(0,10);
  $('contentModal').classList.add('on');
};
window.delRec=async function(id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  const {error}=await sb.from('records').delete().eq('id',id);
  if(error){toast('삭제 실패');return;}
  toast('삭제되었습니다'); await loadYear();
};

/* 검색 + 정렬 */
$('searchInput').addEventListener('input',e=>{searchText=e.target.value.trim().toLowerCase();renderBoard();});
function toggleSort(kind){
  sortDir[kind]=sortDir[kind]==='desc'?'asc':'desc';
  const btn=kind==='review'?$('sortReview'):$('sortContent');
  if(btn) btn.textContent=sortDir[kind]==='desc'?'↓':'↑';
  renderBoard();
}
function sortArr(arr,dir){
  const d=dir==='asc'?1:-1;
  return arr.sort((a,b)=>{
    const da=a.recorded_at||'', db=b.recorded_at||'';
    if(da!==db) return da<db?-1*d:1*d;
    return (a.created_at||'')<(b.created_at||'')?-1*d:1*d;
  });
}
function stars(n){ let s=''; for(let i=1;i<=5;i++) s+=i<=n?'★':'<span class="off">★</span>'; return s; }

/* ESC + 모달 바깥 클릭 닫기 */
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeReview(); closeContent(); } });
document.getElementById('reviewModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeReview(); });
document.getElementById('contentModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeContent(); });

async function doLogout(){ await sb.auth.signOut(); location.href='index.html'; }
let tT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),2200); }

function toggleSidebar(){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay');
  if(!sb) return;
  const open=sb.classList.toggle('open');
  if(ov) ov.classList.toggle('on', open);
}
window.toggleSidebar=toggleSidebar;
</script>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
</body>
