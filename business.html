<!DOCTYPE html>
<html lang="ko">
<head>
  <script>(function(){try{var t=localStorage.getItem('lam-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAM — 사업</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07070f; --bg2:#0d0d1a; --card:#15151f; --card2:#1c1c2b;
      --border:rgba(255,255,255,0.10);
      --accent:#5b9bff; --accent2:#9cc6ff;
      --text:#f4f4fb; --text2:#b8b8d4; --text3:#7e7ea4;
      --success:#56d99a; --warning:#ffb338; --error:#ff7a7a; --gold:#ffc14d;
      --pink:#ff8fc7; --purple:#b18cff; --teal:#4fd5d5; --orange:#ff9b5b;
      --sidebar:232px; --radius:14px;
    }
    html, body { height:100%; font-family:'Pretendard',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; font-size:15px; }
    .app { display:flex; height:100vh; overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--bg2);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      padding:24px 0 0; overflow-y:auto; overflow-x:hidden; z-index:100; }
    .sidebar::-webkit-scrollbar { width:0; }
    .sidebar-logo { padding:0 20px 22px; border-bottom:1px solid var(--border); margin-bottom:18px; }
    .sidebar-top-profile { padding:0 10px; margin-bottom:16px; }
    .sidebar-top-profile .profile-card { margin-bottom:0; }
    .logo-lam { font-size:20px; font-weight:800; letter-spacing:0.06em;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-full { font-size:11px; color:var(--text3); letter-spacing:0.05em; margin-top:3px; }
    .sidebar-section { padding:0 10px; margin-bottom:6px; }
    .sidebar-label { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--text3); padding:0 8px; margin-bottom:6px; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      font-size:14px; font-weight:600; color:var(--text2); cursor:pointer; text-decoration:none;
      transition:background 0.16s,color 0.16s; margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .nav-item.active { background:rgba(91,155,255,0.18); color:var(--accent2); font-weight:700; }
    .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-bottom { margin-top:auto; padding:14px 10px 20px; border-top:1px solid var(--border); }
    .profile-card { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border); margin-bottom:8px; }
    .profile-avatar { width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
    .profile-name { font-size:14px; font-weight:700; color:var(--text); }
    .profile-email { font-size:11px; color:var(--text3); margin-top:1px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
    .btn-logout { width:100%; padding:9px; border-radius:8px; background:transparent;
      border:1px solid var(--border); color:var(--text2); font-family:'Pretendard',sans-serif;
      font-size:13px; font-weight:600; cursor:pointer; transition:all 0.16s; }
    .btn-logout:hover { background:rgba(255,122,122,0.12); color:var(--error); border-color:rgba(255,122,122,0.35); }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px;
      border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
    .topbar-left h1 { font-size:20px; font-weight:800; letter-spacing:-0.01em; }
    .topbar-left p { font-size:13px; color:var(--text2); margin-top:3px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .month-badge { padding:8px 15px; border-radius:9px; background:var(--card);
      border:1px solid var(--border); font-size:14px; font-weight:700; color:var(--text); }
    .btn-record { display:flex; align-items:center; gap:7px; padding:10px 20px; border-radius:10px;
      background:linear-gradient(135deg,var(--accent),#82b4ff); border:none; color:#fff;
      font-family:'Pretendard',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
      transition:box-shadow 0.2s,scale 0.15s; }
    .btn-record:hover { box-shadow:0 6px 22px rgba(91,155,255,0.5); scale:1.02; }
    .btn-record:active { scale:0.98; }
    .content { flex:1; overflow-y:auto; overflow-x:hidden; padding:24px 28px 48px;
      display:flex; flex-direction:column; gap:18px; }
    .content::-webkit-scrollbar { width:5px; }
    .content::-webkit-scrollbar-track { background:transparent; }
    .content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .section-title { font-size:15px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:8px; margin-bottom:-4px; }
    .section-title .tag { font-size:11px; font-weight:700; color:var(--text3); }

    /* ── 준비도 종합 (상단) ── */
    .ready-wrap { display:grid; grid-template-columns:300px 1fr; gap:14px; align-items:stretch; }
    .ready-main { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:22px; display:flex; flex-direction:column; justify-content:center; position:relative; overflow:hidden; }
    .ready-main::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); opacity:0.85; }
    .ready-label { font-size:13px; color:var(--text2); font-weight:600; margin-bottom:8px; }
    .ready-pct { font-size:46px; font-weight:800; color:var(--accent2); letter-spacing:-0.03em; line-height:1; }
    .ready-bar { height:9px; background:rgba(255,255,255,0.07); border-radius:100px; overflow:hidden; margin-top:16px; }
    .ready-bar i { display:block; height:100%; border-radius:100px; width:0;
      background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 0.9s cubic-bezier(0.4,0,0.2,1); }
    .ready-cost { font-size:13px; color:var(--text2); margin-top:14px; font-weight:600; }
    .ready-cost b { color:var(--gold); font-weight:800; }

    .ready-areas { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px 20px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px 22px; align-content:center; }
    .area-row { cursor:pointer; }
    .area-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .area-name { font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:6px; }
    .area-name .ic { font-size:14px; }
    .area-pct { font-size:13px; font-weight:800; color:var(--accent2); }
    .area-bar { height:6px; background:rgba(255,255,255,0.07); border-radius:100px; overflow:hidden; }
    .area-bar i { display:block; height:100%; border-radius:100px; width:0; transition:width 0.8s ease; }
    .area-row:hover .area-name { color:var(--accent2); }

    /* 툴바 */
    .toolbar { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:14px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .toolbar-search { display:flex; align-items:center; gap:8px; background:var(--bg2);
      border:1px solid var(--border); border-radius:10px; padding:10px 13px;
      width:240px; flex-shrink:0; transition:border-color 0.16s; }
    .toolbar-search:focus-within { border-color:var(--accent); }
    .toolbar-search span { font-size:13px; color:var(--text2); }
    .toolbar-search input { flex:1; min-width:0; background:transparent; border:none; outline:none;
      color:var(--text); font-family:'Pretendard',sans-serif; font-size:14px; }
    .toolbar-search input::placeholder { color:var(--text3); }
    .month-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .month-chip { padding:7px 13px; border-radius:100px; font-size:13px; font-weight:700;
      background:transparent; border:1px solid var(--border); color:var(--text2); cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .month-chip:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .month-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .area-filter { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .area-chip { padding:6px 12px; border-radius:100px; font-size:12px; font-weight:700;
      background:transparent; border:1px solid var(--border); color:var(--text2); cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .area-chip:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .area-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* 배움 리스트 (단일 열) */
    .learn-panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px; display:flex; flex-direction:column; gap:11px; min-height:160px; }
    .col-head { display:flex; align-items:center; justify-content:space-between; }
    .col-head-left { display:flex; align-items:center; gap:9px; }
    .col-title { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:800; }
    .col-dot { width:9px; height:9px; border-radius:50%; }
    .col-sub { font-size:12px; color:var(--text2); font-weight:600; }
    .col-tools { display:flex; gap:5px; }
    .col-btn { width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); cursor:pointer; font-size:14px; font-weight:800;
      display:flex; align-items:center; justify-content:center; font-family:'Pretendard',sans-serif;
      transition:all 0.14s; line-height:1; }
    .col-btn:hover { border-color:var(--accent); color:var(--accent2); background:rgba(91,155,255,0.1); }
    .col-btn.sort { font-size:13px; }
    .col-body { display:flex; flex-direction:column; gap:9px; }

    .item { display:flex; align-items:stretch; background:var(--card2); border:1px solid var(--border);
      border-radius:11px; overflow:hidden; transition:border-color 0.16s; }
    .item:hover { border-color:rgba(91,155,255,0.4); }
    .item-main { flex:1; min-width:0; padding:16px 18px; cursor:pointer;
      display:grid; grid-template-columns:1.4fr 1fr; gap:4px 18px; align-items:center; min-height:74px; }
    .item-left { display:flex; flex-direction:column; gap:7px; min-width:0; }
    .item-title { font-size:16px; font-weight:800; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-date-row { display:flex; align-items:center; gap:8px; }
    .item-date { font-size:12px; color:var(--text3); flex-shrink:0; }
    .item-memo { font-size:12.5px; color:var(--text2); grid-column:1/-1; margin-top:8px;
      padding-top:8px; border-top:1px solid var(--border); min-height:30px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-right { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
    .badges { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
    .badge { font-size:11px; font-weight:800; padding:4px 10px; border-radius:100px; letter-spacing:0.02em; white-space:nowrap;
      background:rgba(91,155,255,0.16); color:var(--accent2); }
    .item-cost { font-size:13px; color:var(--text2); font-weight:700; }
    .item-cost b { color:var(--gold); font-size:15px; font-weight:800; }
    .item-ops { display:flex; flex-direction:column; border-left:1px solid var(--border); }
    .item-ops button { flex:1; width:48px; border:none; background:transparent; cursor:pointer;
      color:var(--text2); font-size:12px; font-weight:700; font-family:'Pretendard',sans-serif;
      transition:background 0.14s,color 0.14s; }
    .item-ops button:hover { background:rgba(91,155,255,0.16); color:var(--accent2); }
    .item-ops button.del:hover { background:rgba(255,122,122,0.16); color:var(--error); }
    .item-ops button + button { border-top:1px solid var(--border); }
    .col-empty { font-size:13px; color:var(--text3); text-align:center; padding:30px 0; }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.66); backdrop-filter:blur(4px);
      display:none; align-items:center; justify-content:center; z-index:200; opacity:0; transition:opacity 0.22s; }
    .modal-bg.on { display:flex; opacity:1; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:18px;
      padding:28px; width:460px; max-width:92vw; transform:scale(0.96); transition:transform 0.22s;
      max-height:90vh; overflow-y:auto; }
    .modal-bg.on .modal { transform:scale(1); }
    .modal h3 { font-size:19px; font-weight:800; margin-bottom:22px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; color:var(--text2); margin-bottom:8px; font-weight:700; }
    .field input, .field select, .field textarea { width:100%; background:var(--bg2); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px; color:var(--text); font-size:15px;
      font-family:'Pretendard',sans-serif; outline:none; transition:border-color 0.16s; resize:vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); }
    .field input[type=date] { cursor:pointer; }
    .field input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.7) brightness(1.4); cursor:pointer; opacity:0.9; }
    /* 영역 4x2 그리드 (단일 선택) */
    .area-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .area-grid button { padding:12px 4px; border-radius:10px; border:1px solid var(--border);
      background:var(--bg2); color:var(--text2); font-size:13px; cursor:pointer;
      font-family:'Pretendard',sans-serif; transition:all 0.16s; font-weight:700; text-align:center; white-space:nowrap; }
    .area-grid button:hover { border-color:var(--accent); color:var(--text); }
    .area-grid button.on { background:rgba(91,155,255,0.18); color:var(--accent2); border-color:var(--accent); }
    /* 진행률 슬라이더 */
    .prog-wrap { display:flex; align-items:center; gap:14px; }
    .prog-wrap input[type=range] { flex:1; accent-color:var(--accent); height:6px; cursor:pointer; }
    .prog-val { font-size:22px; font-weight:800; color:var(--accent2); min-width:64px; text-align:right; }
    .modal-foot { display:flex; gap:9px; margin-top:24px; }
    .modal-foot button { flex:1; padding:13px; border-radius:10px; font-size:14px; font-weight:700;
      cursor:pointer; border:none; font-family:'Pretendard',sans-serif; transition:all 0.16s; }
    .btn-cancel { background:var(--card2); color:var(--text2); border:1px solid var(--border); }
    .btn-cancel:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .btn-save { background:linear-gradient(135deg,var(--accent),#82b4ff); color:#fff; }
    .btn-save:hover { box-shadow:0 6px 22px rgba(91,155,255,0.5); }

    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(18px);
      background:var(--accent); color:#fff; padding:13px 24px; border-radius:10px; font-size:14px;
      font-weight:700; opacity:0; pointer-events:none; transition:all 0.28s; z-index:300; }
    .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
    .fade-up { opacity:0; transform:translateY(14px); animation:fadeUp 0.5s ease forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media (max-width:900px) { .ready-wrap { grid-template-columns:1fr; } }
    @media (max-width:768px) {
      .sidebar { display:none; }
      .topbar { padding:14px 16px; }
      .content { padding:18px 14px 80px; }
      .toolbar-search { width:100%; }
      .ready-areas { grid-template-columns:1fr; }
      .area-grid { grid-template-columns:repeat(2,1fr); }
      .item-main { grid-template-columns:1fr; gap:10px; }
      .item-right { align-items:flex-start; }
      .badges { justify-content:flex-start; }
    }
  
    /* ── 모바일 햄버거 ── */
    .hamburger { display:none; width:38px; height:38px; border-radius:9px; border:1px solid var(--border);
      background:var(--card); color:var(--text); font-size:18px; cursor:pointer; align-items:center;
      justify-content:center; flex-shrink:0; margin-right:4px; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
      backdrop-filter:blur(2px); z-index:140; opacity:0; transition:opacity 0.22s; }
    .sidebar-overlay.on { display:block; opacity:1; }
    @media (max-width:768px){
      .hamburger { display:flex; }
      .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%);
        transition:transform 0.26s cubic-bezier(0.4,0,0.2,1); display:flex; z-index:160; }
      .sidebar.open { transform:translateX(0); }
    }
  
    /* ── 라이트 테마 ── */
    html[data-theme="light"] {
      --bg:#f4f5fa; --bg2:#eceef5; --card:#ffffff; --card2:#f7f8fc;
      --border:rgba(20,22,40,0.10);
      --accent:#3b7ff5; --accent2:#2c66d6;
      --text:#1a1c2e; --text2:#4a4d68; --text3:#8a8da8;
      --success:#1f9e5e; --warning:#c77b12; --error:#d94646; --gold:#c79212;
      --pink:#d65a96; --purple:#7d54d6; --teal:#1f9e9e; --orange:#d97b2e;
    }
    html[data-theme="light"] body { background:var(--bg); color:var(--text); }

    /* 테마 토글 */
    .theme-toggle { display:flex; align-items:center; justify-content:space-between; width:100%;
      padding:9px 11px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border);
      color:var(--text2); font-family:'Pretendard',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
      transition:all 0.16s; margin-bottom:8px; }
    .theme-toggle:hover { background:rgba(255,255,255,0.09); color:var(--text); }
    .theme-toggle .tt-track { width:38px; height:20px; border-radius:100px; background:var(--card2);
      border:1px solid var(--border); position:relative; transition:background 0.2s; flex-shrink:0; }
    .theme-toggle .tt-knob { position:absolute; top:1px; left:1px; width:16px; height:16px; border-radius:50%;
      background:var(--accent); transition:transform 0.22s cubic-bezier(0.4,0,0.2,1); }
    html[data-theme="light"] .theme-toggle .tt-knob { transform:translateX(18px); }
  
    /* 라이트 테마 표면색 보정 */
    html[data-theme="light"] .nav-item:hover,
    html[data-theme="light"] .month-chip:hover,
    html[data-theme="light"] .area-chip:hover,
    html[data-theme="light"] .btn-cancel:hover,
    html[data-theme="light"] .theme-toggle:hover { background:rgba(20,22,40,0.06); }
    html[data-theme="light"] .profile-card,
    html[data-theme="light"] .theme-toggle { background:rgba(20,22,40,0.04); }
    html[data-theme="light"] .cmp-row.head { background:rgba(20,22,40,0.04); }
    html[data-theme="light"] .cmp-bar,
    html[data-theme="light"] .ready-bar,
    html[data-theme="light"] .area-bar,
    html[data-theme="light"] .progress-track,
    html[data-theme="light"] .sc-dist-bar-wrap,
    html[data-theme="light"] .tt-track { background:rgba(20,22,40,0.08); }
    html[data-theme="light"] .delta.flat,
    html[data-theme="light"] .sc-delta.flat,
    html[data-theme="light"] .ch-chg.flat { background:rgba(20,22,40,0.06); }
    html[data-theme="light"] .badge { filter:saturate(1.1); }
    html[data-theme="light"] .nav-item.active { background:rgba(59,127,245,0.14); }
    html[data-theme="light"] .summary-card,
    html[data-theme="light"] .panel,
    html[data-theme="light"] .board-col,
    html[data-theme="light"] .ch-card,
    html[data-theme="light"] .item { box-shadow:0 1px 3px rgba(20,22,40,0.06); }
    html[data-theme="light"] .topbar,
    html[data-theme="light"] .sidebar { background:var(--bg2); }
    html[data-theme="light"] .item { background:var(--card2); }
    html[data-theme="light"] .cal-cell { background:var(--card2); }
    html[data-theme="light"] .hamburger { background:var(--card); }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-lam">LAM</div>
      <div class="logo-full">Life Architecture Map</div>
    </div>
    <div class="sidebar-top-profile">
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div style="min-width:0;">

<!-- 배움 모달 -->
<div class="modal-bg" id="learnModal">
  <div class="modal">
    <h3 id="lnModalTitle">배움 기록</h3>
    <div class="field">
      <label>사업 영역</label>
      <div class="area-grid" id="areaTabs"></div>
    </div>
    <div class="field"><label>배운 내용 / 항목</label><input id="lnTitle" type="text" placeholder="예: 법인 설립 절차, 핵심 인재 채용 기준" /></div>
    <div class="field"><label>예상 비용 (선택)</label><input id="lnCost" type="text" inputmode="numeric" placeholder="0" /></div>

    <div class="modal-foot">

<!-- 진행률 모달 -->
<div class="modal-bg" id="progModal">
  <div class="modal">
    <h3 id="pgModalTitle">진행률 설정</h3>
    <p style="font-size:13px; color:var(--text2); margin:-12px 0 22px; line-height:1.6;">
      <b id="pgAreaName" style="color:var(--accent2)"></b> 영역이 현재 어느 정도 준비됐는지 설정하세요.</p>
    <div class="field">
      <label>진행률</label>
      <div class="prog-wrap">
        <input id="pgRange" type="range" min="0" max="100" step="5" value="0" />
        <span class="prog-val" id="pgVal">0%</span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeProg()">취소</button>
      <button class="btn-save" onclick="saveProg()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://jmumomvxylxbkagjnmxc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdW1vbXZ4eWx4YmthZ2pubXhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODc5NzksImV4cCI6MjA5NTg2Mzk3OX0.OQBcCmA7ULgZ28zujvuB_FH0WbUmlHqks_TY97FB7E8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user=null, categoryId=null;
let editingLn=null, curArea=null, curProgArea=null;
let allRecords=[];        // 전체(진행률 포함, 연도 무관) — progress
let yearRecords=[];       // 올해 learn 기록
let selMonth=new Date().getMonth()+1;
let searchText='', filterArea='all', sortDir='desc';
const YEAR=new Date().getFullYear();

const AREAS=[
  {name:'구조 설계', ic:'🏗️'},
  {name:'인력 채용', ic:'🧑‍💼'},
  {name:'자금·투자', ic:'💵'},
  {name:'제품·서비스', ic:'📦'},
  {name:'마케팅·영업', ic:'📣'},
  {name:'법무·행정', ic:'⚖️'},
  {name:'운영·시스템', ic:'⚙️'},
  {name:'기타', ic:'🔖'},
];
const AREA_NAMES=AREAS.map(a=>a.name);

const $=id=>document.getElementById(id);
const days=['일','월','화','수','목','금','토'];
const won=n=>Number(n||0).toLocaleString('ko-KR')+'원';

(async function init(){
  const now=new Date();
  $('todayDate').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  $('monthBadge').textContent=`${now.getMonth()+1}월`;
  const { data:{ session } }=await sb.auth.getSession();
  if(!session){ location.href='index.html'; return; }
  user=session.user;
  const { data:p }=await sb.from('profiles').select('*').eq('id',user.id).single();
  const name=p?.name||user.email.split('@')[0];
  $('profileName').textContent=name;
  $('profileEmail').textContent=p?.email||user.email;
  $('profileAvatar').textContent=name.charAt(0).toUpperCase(); applySidebarAvatar(p,name);
  categoryId=await ensureCategory();
  buildAreaTabs(); buildAreaFilter(); buildMonthChips();
  $('lnDate').value=new Date().toISOString().slice(0,10);
  document.querySelectorAll('input[type=date]').forEach(inp=>{
    inp.addEventListener('click', ()=>{ try{ inp.showPicker(); }catch(e){} });
    inp.addEventListener('focus', ()=>{ try{ inp.showPicker(); }catch(e){} });
  });
  // 진행률 슬라이더
  $('pgRange').addEventListener('input', e=>{ $('pgVal').textContent=e.target.value+'%'; });
  await loadAll();
})();

async function ensureCategory(){
  const { data }=await sb.from('categories').select('id')
    .eq('user_id',user.id).eq('name','사업').maybeSingle();
  if(data) return data.id;
  const { data:ins }=await sb.from('categories')
    .insert({ user_id:user.id, name:'사업', icon:'💼', color:'#5b9bff', sort_order:6 })
    .select('id').single();
  return ins.id;
}

function buildAreaTabs(){
  $('areaTabs').innerHTML=AREAS.map(a=>`<button data-area="${a.name}">${a.name}</button>`).join('');
  document.querySelectorAll('#areaTabs button').forEach(b=> b.onclick=()=>setArea(b.dataset.area));
}
function setArea(a){ curArea=a; document.querySelectorAll('#areaTabs button').forEach(b=>b.classList.toggle('on', b.dataset.area===a)); }

function buildAreaFilter(){
  const all=[{name:'all',label:'전체'},...AREAS.map(a=>({name:a.name,label:a.name}))];
  $('areaFilter').innerHTML=all.map(a=>`<button class="area-chip ${a.name==='all'?'active':''}" data-area="${a.name}">${a.label}</button>`).join('');
  document.querySelectorAll('#areaFilter button').forEach(b=>{
    b.onclick=()=>{ filterArea=b.dataset.area;
      document.querySelectorAll('#areaFilter button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); renderLearnList(); };
  });
}
function buildMonthChips(){
  $('monthRow').innerHTML=Array.from({length:12},(_,i)=>i+1).map(m=>
    `<button class="month-chip ${m===selMonth?'active':''}" data-m="${m}">${m}월</button>`).join('');
  document.querySelectorAll('.month-chip').forEach(b=>{
    b.onclick=()=>{ selMonth=Number(b.dataset.m);
      document.querySelectorAll('.month-chip').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); renderLearnList(); };
  });
}

/* 배움 모달 */
function openLearn(edit){
  if(!edit){ editingLn=null; $('lnModalTitle').textContent='배움 기록';
    setArea(AREAS[0].name); $('lnTitle').value=''; $('lnCost').value=''; $('lnMemo').value='';
    const d=new Date(YEAR, selMonth-1, Math.min(new Date().getDate(),28));
    $('lnDate').value=d.toISOString().slice(0,10);
  }
  $('learnModal').classList.add('on');
}
function closeLearn(){ $('learnModal').classList.remove('on'); }
$('learnModal').addEventListener('click', e=>{ if(e.target.id==='learnModal') closeLearn(); });
$('lnCost').addEventListener('input', e=>{ const v=e.target.value.replace(/[^0-9]/g,''); e.target.value=v?Number(v).toLocaleString('ko-KR'):''; });
async function saveLearn(){
  if(!curArea){ toast('사업 영역을 선택하세요'); return; }
  const title=$('lnTitle').value.trim();
  if(!title){ toast('배운 내용을 입력하세요'); return; }
  const cost=Number($('lnCost').value.replace(/[^0-9]/g,''))||0;
  const memo=`${curArea}|${title}|${$('lnMemo').value.trim()}`;
  const payload={ user_id:user.id, category_id:categoryId, metric_id:null,
    value:cost, memo, status:'learn', recorded_at:$('lnDate').value };
  let err;
  if(editingLn){ ({error:err}=await sb.from('records').update(payload).eq('id',editingLn)); }
  else { ({error:err}=await sb.from('records').insert(payload)); }
  if(err){ toast('저장 실패: '+err.message); return; }
  closeLearn(); toast(editingLn?'수정되었습니다':'저장되었습니다'); await loadAll();
}

/* 진행률 모달 */
function openProg(area){
  curProgArea=area;
  $('pgAreaName').textContent=area;
  const cur=progressOf(area);
  $('pgRange').value=cur; $('pgVal').textContent=cur+'%';
  $('progModal').classList.add('on');
}
function closeProg(){ $('progModal').classList.remove('on'); }
$('progModal').addEventListener('click', e=>{ if(e.target.id==='progModal') closeProg(); });
async function saveProg(){
  const val=Number($('pgRange').value);
  // 영역별 진행률은 status='progress', memo=영역명, value=%로 1건만 유지
  const existing=allRecords.find(r=>r.status==='progress' && r.memo===curProgArea);
  let err;
  if(existing){ ({error:err}=await sb.from('records').update({ value:val }).eq('id',existing.id)); }
  else { ({error:err}=await sb.from('records').insert({ user_id:user.id, category_id:categoryId,
    metric_id:null, value:val, memo:curProgArea, status:'progress', recorded_at:new Date().toISOString().slice(0,10) })); }
  if(err){ toast('저장 실패: '+err.message); return; }
  closeProg(); toast('진행률 저장됨'); await loadAll();
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeLearn(); closeProg(); } });

async function loadAll(){
  // progress (연도 무관 전체) + 올해 learn
  const { data:progs }=await sb.from('records').select('*')
    .eq('user_id',user.id).eq('category_id',categoryId).eq('status','progress');
  allRecords=progs||[];
  const { data:learns, error }=await sb.from('records').select('*')
    .eq('user_id',user.id).eq('category_id',categoryId).eq('status','learn')
    .gte('recorded_at',`${YEAR}-01-01`).lte('recorded_at',`${YEAR}-12-31`)
    .order('recorded_at',{ascending:false}).order('created_at',{ascending:false});
  if(error){ toast('불러오기 실패'); return; }
  yearRecords=learns||[];
  renderReady(); renderLearnList();
}

function progressOf(area){
  const r=allRecords.find(x=>x.status==='progress' && x.memo===area);
  return r? Number(r.value) : 0;
}
function monthOf(r){ return Number((r.recorded_at||'').slice(5,7)); }
function part(memo,i){ return (memo||'').split('|')[i]||''; }

/* 준비도 종합 */
function renderReady(){
  const pcts=AREA_NAMES.map(a=>progressOf(a));
  const total=Math.round(pcts.reduce((s,v)=>s+v,0)/AREA_NAMES.length);
  $('totalPct').textContent=total+'%';
  $('totalBar').style.width=total+'%';
  // 예상 총비용 (전체 learn 기록의 비용 합)
  const cost=yearRecords.reduce((s,r)=>s+Number(r.value||0),0);
  $('totalCost').textContent=won(cost);
  // 영역별
  $('areaList').innerHTML=AREAS.map(a=>{
    const p=progressOf(a.name);
    const col= p>=70?'var(--success)': p>=30?'var(--accent)':'var(--text3)';
    return `<div class="area-row" onclick="openProg('${a.name}')">
      <div class="area-top">
        <span class="area-name"><span class="ic">${a.ic}</span>${a.name}</span>
        <span class="area-pct">${p}%</span>
      </div>
      <div class="area-bar"><i style="width:${p}%;background:${col}"></i></div>
    </div>`;
  }).join('');
}

$('searchInput').addEventListener('input', e=>{ searchText=e.target.value.trim().toLowerCase(); renderLearnList(); });
function toggleSort(){
  sortDir= sortDir==='desc'?'asc':'desc';
  $('sortLearn').textContent= sortDir==='desc'?'↓':'↑';
  renderLearnList();
}

function renderLearnList(){
  let arr=yearRecords.filter(r=>monthOf(r)===selMonth);
  if(filterArea!=='all') arr=arr.filter(r=>part(r.memo,0)===filterArea);
  const monthAll=arr.slice();
  if(searchText) arr=arr.filter(r=>`${part(r.memo,0)} ${part(r.memo,1)} ${part(r.memo,2)}`.toLowerCase().includes(searchText));
  const d= sortDir==='asc'?1:-1;
  arr.sort((a,b)=>{ const da=a.recorded_at||'', db=b.recorded_at||'';
    if(da!==db) return da<db?-1*d:1*d;
    return (a.created_at||'')<(b.created_at||'')?-1*d:1*d; });
  const totCost=monthAll.reduce((s,r)=>s+Number(r.value||0),0);
  $('learnSub').textContent=`${monthAll.length}건 · 예상비용 ${won(totCost)}`;
  $('colLearn').innerHTML= arr.length? arr.map(learnCard).join('') : '<div class="col-empty">기록 없음</div>';
}

function learnCard(r){
  const area=part(r.memo,0), title=part(r.memo,1), note=part(r.memo,2);
  const dateFull=(r.recorded_at||'').slice(0,10).replace(/-/g,'.');
  const rj=JSON.stringify(r).replace(/'/g,"&#39;");
  const cost=Number(r.value||0);
  const costTxt= cost>0? `<span class="item-cost">예상 <b>${won(cost)}</b></span>` : '';
  return `<div class="item">
    <div class="item-main" onclick='editLearn(${rj})'>
      <div class="item-left">
        <span class="item-title">${title||'(제목 없음)'}</span>
        <div class="item-date-row"><span class="item-date">${dateFull}</span></div>
      </div>
      <div class="item-right">
        <div class="badges"><span class="badge">${area||'기타'}</span></div>
        ${costTxt}
      </div>
      <div class="item-memo">${note||''}</div>
    </div>
    <div class="item-ops">
      <button onclick='editLearn(${rj})'>수정</button>
      <button class="del" onclick="delRec('${r.id}')">삭제</button>
    </div></div>`;
}

window.editLearn=function(r){
  editingLn=r.id; $('lnModalTitle').textContent='배움 수정';
  setArea(part(r.memo,0)||AREAS[0].name);
  $('lnTitle').value=part(r.memo,1);
  $('lnCost').value= Number(r.value)>0? Number(r.value).toLocaleString('ko-KR'):'';
  $('lnMemo').value=part(r.memo,2);
  $('lnDate').value=(r.recorded_at||'').slice(0,10);
  $('learnModal').classList.add('on');
};
window.delRec=async function(id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  const { error }=await sb.from('records').delete().eq('id',id);
  if(error){ toast('삭제 실패'); return; }
  toast('삭제되었습니다'); await loadAll();
};
window.openProg=openProg;

async function doLogout(){ await sb.auth.signOut(); location.href='index.html'; }
let tT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),2200); }

function toggleSidebar(){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay');
  if(!sb) return;
  const open=sb.classList.toggle('open');
  if(ov) ov.classList.toggle('on', open);
}
window.toggleSidebar=toggleSidebar;

function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); try{localStorage.setItem('lam-theme',t);}catch(e){}
  var lbl=document.getElementById('themeLabel'); if(lbl) lbl.textContent = t==='light'?'라이트 모드':'다크 모드'; }
function toggleTheme(){ var cur=document.documentElement.getAttribute('data-theme')||'dark'; applyTheme(cur==='light'?'dark':'light'); }
window.toggleTheme=toggleTheme;
(function(){ var t=document.documentElement.getAttribute('data-theme')||'dark'; var lbl=document.getElementById('themeLabel'); if(lbl) lbl.textContent=t==='light'?'라이트 모드':'다크 모드'; })();

function applySidebarAvatar(p,name){
  try{
    var el=document.getElementById('profileAvatar'); if(!el) return;
    var img=p&&p.avatar_image, col=(p&&p.avatar_color)||'#5b9bff';
    if(img){ el.textContent=''; el.style.background='center/cover no-repeat url('+img+')'; }
    else { el.style.backgroundImage=''; el.style.background='linear-gradient(135deg,'+col+','+col+')'; el.textContent=(name||'?').charAt(0).toUpperCase(); }
  }catch(e){}
}

document.addEventListener('click',function(e){ var t=e.target; if(t&&t.matches&&t.matches('input[type=date]')){ try{ t.showPicker(); }catch(_){} } },true);
</script>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
</body>
