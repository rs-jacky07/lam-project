<!DOCTYPE html>
<html lang="ko">
<head>
  <script>(function(){try{var t=localStorage.getItem('lam-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAM — 월간 비교</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#07070f; --bg2:#0d0d1a; --card:#15151f; --card2:#1c1c2b;
      --border:rgba(255,255,255,0.10);
      --accent:#5b9bff; --accent2:#9cc6ff;
      --text:#f4f4fb; --text2:#b8b8d4; --text3:#7e7ea4;
      --success:#56d99a; --warning:#ffb338; --error:#ff7a7a; --gold:#ffc14d;
      --pink:#ff8fc7; --purple:#b18cff; --teal:#4fd5d5; --orange:#ff9b5b;
      --sidebar:232px; --radius:14px;
    }
    html[data-theme="light"] {
      --bg:#f4f5fa; --bg2:#eceef5; --card:#ffffff; --card2:#f7f8fc;
      --border:rgba(20,22,40,0.10);
      --accent:#3b7ff5; --accent2:#2c66d6;
      --text:#1a1c2e; --text2:#4a4d68; --text3:#8a8da8;
      --success:#1f9e5e; --warning:#c77b12; --error:#d94646; --gold:#c79212;
      --pink:#d65a96; --purple:#7d54d6; --teal:#1f9e9e; --orange:#d97b2e;
    }
    html[data-theme="light"] body { background:var(--bg); color:var(--text); }
    html, body { height:100%; font-family:'Pretendard',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; font-size:15px; }
    .app { display:flex; height:100vh; overflow:hidden; }

    .sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--bg2);
      border-right:1px solid var(--border); display:flex; flex-direction:column; padding:24px 0 0; overflow-y:auto; overflow-x:hidden; z-index:100; }
    .sidebar::-webkit-scrollbar { width:0; }
    .sidebar-logo { padding:0 20px 22px; border-bottom:1px solid var(--border); margin-bottom:18px; }
    .sidebar-top-profile { padding:0 10px; margin-bottom:16px; }
    .sidebar-top-profile .profile-card { margin-bottom:0; }
    .logo-lam { font-size:20px; font-weight:800; letter-spacing:0.06em;
      background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-full { font-size:11px; color:var(--text3); letter-spacing:0.05em; margin-top:3px; }
    .sidebar-section { padding:0 10px; margin-bottom:6px; }
    .sidebar-label { font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--text3); padding:0 8px; margin-bottom:6px; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px;
      font-size:14px; font-weight:600; color:var(--text2); cursor:pointer; text-decoration:none; transition:background 0.16s,color 0.16s; margin-bottom:2px; }
    .nav-item:hover { background:rgba(255,255,255,0.07); color:var(--text); }
    .nav-item.active { background:rgba(91,155,255,0.18); color:var(--accent2); font-weight:700; }
    html[data-theme="light"] .nav-item:hover { background:rgba(20,22,40,0.06); }
    html[data-theme="light"] .nav-item.active { background:rgba(59,127,245,0.14); }
    .nav-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-bottom { margin-top:auto; padding:14px 10px 20px; border-top:1px solid var(--border); }
    .theme-toggle { display:flex; align-items:center; justify-content:space-between; width:100%; padding:9px 11px; border-radius:10px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text2); font-family:'Pretendard',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.16s; margin-bottom:8px; }
    .theme-toggle:hover { background:rgba(255,255,255,0.09); color:var(--text); }
    html[data-theme="light"] .theme-toggle { background:rgba(20,22,40,0.04); }
    .theme-toggle .tt-track { width:38px; height:20px; border-radius:100px; background:var(--card2); border:1px solid var(--border); position:relative; flex-shrink:0; }
    html[data-theme="light"] .tt-track { background:rgba(20,22,40,0.08); }
    .theme-toggle .tt-knob { position:absolute; top:1px; left:1px; width:16px; height:16px; border-radius:50%; background:var(--accent); transition:transform 0.22s cubic-bezier(0.4,0,0.2,1); }
    html[data-theme="light"] .theme-toggle .tt-knob { transform:translateX(18px); }
    .profile-card { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid var(--border); margin-bottom:8px; }
    html[data-theme="light"] .profile-card { background:rgba(20,22,40,0.04); }
    .profile-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
    .profile-name { font-size:14px; font-weight:700; color:var(--text); }
    .profile-email { font-size:11px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
    .btn-logout { width:100%; padding:9px; border-radius:8px; background:transparent; border:1px solid var(--border); color:var(--text2); font-family:'Pretendard',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.16s; }
    .btn-logout:hover { background:rgba(255,122,122,0.12); color:var(--error); border-color:rgba(255,122,122,0.35); }

    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
    html[data-theme="light"] .topbar, html[data-theme="light"] .sidebar { background:var(--bg2); }
    .topbar-left h1 { font-size:20px; font-weight:800; letter-spacing:-0.01em; }
    .topbar-left p { font-size:13px; color:var(--text2); margin-top:3px; }
    .content { flex:1; overflow-y:auto; overflow-x:hidden; padding:24px 28px 48px; display:flex; flex-direction:column; gap:18px; }
    .content::-webkit-scrollbar { width:5px; } .content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .section-title { font-size:15px; font-weight:800; display:flex; align-items:center; gap:8px; }
    .section-title .tag { font-size:11px; font-weight:700; color:var(--text3); }
    .panel { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    html[data-theme="light"] .panel { box-shadow:0 1px 3px rgba(20,22,40,0.06); }
    .chart-box { height:300px; position:relative; }

    /* 비교 테이블 */
    .cmp-table { width:100%; border-collapse:collapse; }
    .cmp-table th, .cmp-table td { padding:13px 14px; text-align:right; font-size:14px; border-bottom:1px solid var(--border); }
    .cmp-table th { font-size:12px; color:var(--text3); font-weight:700; text-align:right; }
    .cmp-table th:first-child, .cmp-table td:first-child { text-align:left; }
    .cmp-table td.cat { font-weight:700; color:var(--text); }
    .cmp-table td .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; }
    .cmp-table tr:last-child td { border-bottom:none; }
    .cmp-num { font-weight:700; color:var(--text2); }
    .cmp-chg { font-size:12px; font-weight:700; padding:2px 8px; border-radius:100px; }
    .cmp-chg.up { color:var(--success); background:rgba(86,217,154,0.15); }
    .cmp-chg.dn { color:var(--error); background:rgba(255,122,122,0.15); }
    .cmp-chg.flat { color:var(--text3); background:rgba(255,255,255,0.06); }
    html[data-theme="light"] .cmp-chg.flat { background:rgba(20,22,40,0.06); }

    .mon-select { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .mon-select select { background:var(--bg2); border:1px solid var(--border); border-radius:9px; padding:9px 13px;
      color:var(--text); font-family:'Pretendard',sans-serif; font-size:14px; font-weight:700; outline:none; cursor:pointer; }
    .mon-select .vs { color:var(--text3); font-weight:700; font-size:13px; }

    .sum-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sum-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    html[data-theme="light"] .sum-card { box-shadow:0 1px 3px rgba(20,22,40,0.06); }
    .sum-card .l { font-size:12px; color:var(--text2); font-weight:600; }
    .sum-card .n { font-size:24px; font-weight:800; margin-top:6px; letter-spacing:-0.02em; }
    .sum-card .s { font-size:12px; margin-top:6px; font-weight:700; }

    .hamburger { display:none; width:38px; height:38px; border-radius:9px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:18px; cursor:pointer; align-items:center; justify-content:center; flex-shrink:0; margin-right:4px; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(2px); z-index:140; opacity:0; transition:opacity 0.22s; }
    .sidebar-overlay.on { display:block; opacity:1; }
    @media (max-width:768px){
      .hamburger { display:flex; }
      .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); transition:transform 0.26s cubic-bezier(0.4,0,0.2,1); display:flex; z-index:160; }
      .sidebar.open { transform:translateX(0); }
      .topbar { padding:14px 16px; } .content { padding:18px 14px 80px; }
      .sum-grid { grid-template-columns:1fr; }
      .cmp-table { font-size:12px; } .cmp-table th, .cmp-table td { padding:10px 8px; }
    }
  </style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-lam">LAM</div><div class="logo-full">Life Architecture Map</div></div>
    <div class="sidebar-top-profile">
      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div style="min-width:0;"><div class="profile-name" id="profileName">로딩 중...</div><div class="profile-email" id="profileEmail"></div></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">메뉴</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">⊞</span> 대시보드</a>
      <a class="nav-item" href="history.html"><span class="nav-icon">◷</span> 히스토리</a>
      <a class="nav-item active" href="compare.html"><span class="nav-icon">⟳</span> 월간 비교</a>
      <a class="nav-item" href="channels.html"><span class="nav-icon">📈</span> 채널 추이</a>
    </div>
    <div class="sidebar-section" style="margin-top:10px;">
      <div class="sidebar-label">카테고리</div>
      <a class="nav-item" href="finance.html"><span class="nav-icon">💰</span> 금융</a>
      <a class="nav-item" href="skin.html"><span class="nav-icon">✨</span> 피부</a>
      <a class="nav-item" href="health.html"><span class="nav-icon">💪</span> 건강</a>
      <a class="nav-item" href="music.html"><span class="nav-icon">🎵</span> 음악</a>
      <a class="nav-item" href="business.html"><span class="nav-icon">💼</span> 사업</a>
    </div>
    <div class="sidebar-section" style="margin-top:10px;">
      <div class="sidebar-label">설정</div>
      <a class="nav-item" href="settings.html"><span class="nav-icon">⚙</span> 설정</a>
    </div>
    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()"><span id="themeLabel">다크 모드</span><span class="tt-track"><span class="tt-knob"></span></span></button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;min-width:0;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div class="topbar-left"><h1>⟳ 월간 비교</h1><p id="todayDate"></p></div>
      </div>
    </div>
    <div class="content">
      <div class="section-title">📊 월별 활동량 추이 <span class="tag">· 카테고리별 기록 건수</span></div>
      <div class="panel"><div class="chart-box"><canvas id="trendChart"></canvas></div></div>

      <div class="section-title">🔍 두 달 비교</div>
      <div class="panel">
        <div class="mon-select" style="margin-bottom:18px;">
          <select id="monA"></select>
          <span class="vs">vs</span>
          <select id="monB"></select>
        </div>
        <div style="overflow-x:auto;">
          <table class="cmp-table" id="cmpTable"></table>
        </div>
      </div>

      <div class="section-title">📈 이번 달 요약</div>
      <div class="sum-grid" id="sumGrid"></div>
    </div>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<script>
const SUPABASE_URL='https://jmumomvxylxbkagjnmxc.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdW1vbXZ4eWx4YmthZ2pubXhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODc5NzksImV4cCI6MjA5NTg2Mzk3OX0.OQBcCmA7ULgZ28zujvuB_FH0WbUmlHqks_TY97FB7E8';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let user=null, records=[], idCat={}, catMap={};
const YEAR=new Date().getFullYear(), MONTH=new Date().getMonth()+1;
const $=id=>document.getElementById(id);
const days=['일','월','화','수','목','금','토'];

const CATS=[
  {name:'금융',c:'#4ecb8d'},{name:'피부',c:'#c97ef7'},{name:'건강',c:'#f5a623'},
  {name:'음악',c:'#f06a9a'},{name:'사업',c:'#4f8ef7'},
];
function actStatuses(name){
  return ({'금융':['income','expense','save'],'피부':['review','content'],
    '건강':['workout','inbody'],'음악':['practice','content'],'사업':['learn']})[name]||[];
}
let trendChart=null;

(async function init(){
  const now=new Date();
  $('todayDate').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
  $('themeLabel').textContent=(document.documentElement.getAttribute('data-theme')||'dark')==='light'?'라이트 모드':'다크 모드';
  const { data:{ session } }=await sb.auth.getSession();
  if(!session){ location.href='index.html'; return; }
  user=session.user;
  const { data:p }=await sb.from('profiles').select('*').eq('id',user.id).single();
  const name=p?.name||user.email.split('@')[0];
  $('profileName').textContent=name; $('profileEmail').textContent=p?.email||user.email; $('profileAvatar').textContent=name.charAt(0).toUpperCase(); applySidebarAvatar(p,name);
  const { data:cats }=await sb.from('categories').select('id,name').eq('user_id',user.id);
  (cats||[]).forEach(c=>{ catMap[c.name]=c.id; idCat[c.id]=c.name; });
  const { data:recs }=await sb.from('records').select('*').eq('user_id',user.id)
    .gte('recorded_at',`${YEAR}-01-01`).lte('recorded_at',`${YEAR}-12-31`).neq('status','progress');
  records=recs||[];
  buildMonthSelects();
  drawTrend(); renderCompare(); renderSummary();
})();

function monthOf(r){ return Number((r.recorded_at||'').slice(5,7)); }
function countCatMonth(name, month){
  const sts=actStatuses(name); const cid=catMap[name];
  return records.filter(r=>r.category_id===cid && monthOf(r)===month && sts.includes(r.status)).length;
}
function totalMonth(month){ return CATS.reduce((s,c)=>s+countCatMonth(c.name,month),0); }

function buildMonthSelects(){
  const opts=Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}">${m}월</option>`).join('');
  $('monA').innerHTML=opts; $('monB').innerHTML=opts;
  $('monA').value=Math.max(1,MONTH-1); $('monB').value=MONTH;
  $('monA').onchange=renderCompare; $('monB').onchange=renderCompare;
}

function drawTrend(){
  const labels=Array.from({length:MONTH},(_,i)=>`${i+1}월`);
  const datasets=CATS.map(c=>({
    label:c.name, data:Array.from({length:MONTH},(_,i)=>countCatMonth(c.name,i+1)),
    borderColor:c.c, backgroundColor:c.c+'22', borderWidth:2, tension:0.35, pointRadius:3, pointBackgroundColor:c.c, fill:false,
  }));
  const tc=getComputedStyle(document.documentElement).getPropertyValue('--text3').trim()||'#7e7ea4';
  if(trendChart) trendChart.destroy();
  trendChart=new Chart($('trendChart'),{ type:'line', data:{labels,datasets},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#b8b8d4', font:{size:12}, boxWidth:12, padding:14 } } },
      scales:{ x:{ ticks:{color:tc,font:{size:11}}, grid:{color:'rgba(128,128,128,0.1)'} },
        y:{ ticks:{color:tc,font:{size:11}}, grid:{color:'rgba(128,128,128,0.1)'}, beginAtZero:true } } } });
}

function renderCompare(){
  const a=Number($('monA').value), b=Number($('monB').value);
  let rows=`<tr><th>카테고리</th><th>${a}월</th><th>${b}월</th><th>변화</th></tr>`;
  CATS.forEach(c=>{
    const va=countCatMonth(c.name,a), vb=countCatMonth(c.name,b);
    const diff=vb-va; const cls=diff>0?'up':diff<0?'dn':'flat'; const txt=diff>0?`▲ +${diff}`:diff<0?`▼ ${diff}`:'–';
    rows+=`<tr><td class="cat"><span class="dot" style="background:${c.c}"></span>${c.name}</td>
      <td class="cmp-num">${va}건</td><td class="cmp-num">${vb}건</td>
      <td><span class="cmp-chg ${cls}">${txt}</span></td></tr>`;
  });
  const ta=totalMonth(a), tb=totalMonth(b); const td=tb-ta; const tcls=td>0?'up':td<0?'dn':'flat';
  rows+=`<tr><td class="cat">합계</td><td class="cmp-num">${ta}건</td><td class="cmp-num">${tb}건</td>
    <td><span class="cmp-chg ${tcls}">${td>0?'▲ +'+td:td<0?'▼ '+td:'–'}</span></td></tr>`;
  $('cmpTable').innerHTML=rows;
}

function renderSummary(){
  const cur=totalMonth(MONTH), prev=totalMonth(MONTH-1);
  const diff=cur-prev; const dcls=diff>=0?'up':'dn';
  // 가장 활발 / 부족
  const counts=CATS.map(c=>({name:c.name,n:countCatMonth(c.name,MONTH)})).sort((a,b)=>b.n-a.n);
  const top=counts[0], low=counts[counts.length-1];
  $('sumGrid').innerHTML=`
    <div class="sum-card"><div class="l">이번 달 총 기록</div><div class="n" style="color:var(--accent2)">${cur}건</div>
      <div class="s" style="color:${diff>=0?'var(--success)':'var(--error)'}">${diff>=0?'▲ +':'▼ '}${Math.abs(diff)}건 (전월 ${prev}건)</div></div>
    <div class="sum-card"><div class="l">가장 활발한 카테고리</div><div class="n" style="color:var(--success)">${top.n>0?top.name:'—'}</div>
      <div class="s" style="color:var(--text3)">${top.n}건 기록</div></div>
    <div class="sum-card"><div class="l">관심이 필요한 카테고리</div><div class="n" style="color:var(--warning)">${low.name}</div>
      <div class="s" style="color:var(--text3)">${low.n}건 기록</div></div>`;
}

function toggleTheme(){ var cur=document.documentElement.getAttribute('data-theme')||'dark'; var n=cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',n); try{localStorage.setItem('lam-theme',n);}catch(e){}
  $('themeLabel').textContent=n==='light'?'라이트 모드':'다크 모드'; drawTrend(); }
window.toggleTheme=toggleTheme;
function toggleSidebar(){ const s=$('sidebar'),o=$('sidebarOverlay'); const op=s.classList.toggle('open'); if(o)o.classList.toggle('on',op); }
window.toggleSidebar=toggleSidebar;
async function doLogout(){ await sb.auth.signOut(); location.href='index.html'; }

function applySidebarAvatar(p,name){
  try{
    var el=document.getElementById('profileAvatar'); if(!el) return;
    var img=p&&p.avatar_image, col=(p&&p.avatar_color)||'#5b9bff';
    if(img){ el.textContent=''; el.style.background='center/cover no-repeat url('+img+')'; }
    else { el.style.backgroundImage=''; el.style.background='linear-gradient(135deg,'+col+','+col+')'; el.textContent=(name||'?').charAt(0).toUpperCase(); }
  }catch(e){}
}
</script>
</body>
</html>
